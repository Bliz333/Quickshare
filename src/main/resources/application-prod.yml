spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/quickshare?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:quickshare}
    password: ${DB_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: ${DB_CONN_TIMEOUT:60000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
      file-size-threshold: 10MB

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    timeout: ${REDIS_TIMEOUT:60000}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          timeout: 60000
          connection-timeout: 60000
          starttls:
            enable: true
            required: true

server:
  port: ${SERVER_PORT:8888}
  tomcat:
    connection-timeout: 600000
    max-swallow-size: -1
    max-http-form-post-size: -1
    threads:
      max: 200
      min-spare: 10
  max-http-header-size: 8KB

file:
  upload-dir: ${FILE_UPLOAD_DIR:/opt/quickshare/uploads}
  allowed-types: ${FILE_ALLOWED_TYPES:}
  max-size: ${FILE_MAX_SIZE_BYTES:-1}

jwt:
  secret: ${JWT_SECRET:change-this-secret-at-least-256-bits}
  expiration: ${JWT_EXPIRATION_MS:86400000}

recaptcha:
  enabled: ${RECAPTCHA_ENABLED:true}
  site-key: ${RECAPTCHA_SITE_KEY:}
  secret-key: ${RECAPTCHA_SECRET_KEY:}
  verify-url: https://www.google.com/recaptcha/api/siteverify

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
