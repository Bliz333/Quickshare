<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="loginPageTitle">Login - QuickShare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        (function(){var s=localStorage.getItem('quickshare-theme');
        if(s==='dark'||(!s&&window.matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark-mode')})();
    </script>

    <!-- Design-system CSS layer: tokens → base → components -->
    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        body {
            font-family: var(--font-family);
            font-size: clamp(15px, 0.5vw + 13px, 18px);
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        .t-btn {
            border: 1px solid var(--border-s);
            border-radius: var(--radius-full);
            background: var(--card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .t-btn:active { transform: scale(.9); }
        .t-btn-label { border-radius: var(--radius-full); font-size: .78rem; }
    </style>
</head>
<body data-mascot-scene="login">

<div class="bg-glow" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<a href="index.html" class="back-link">
    <i class="fa-solid fa-arrow-left"></i>
    <span data-i18n="backHome">Home</span>
</a>

<div class="top-actions">
    <button class="t-btn" id="darkModeToggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
    <button class="t-btn t-btn-label" id="langBtn" onclick="toggleLanguage()">EN</button>
</div>

<div class="login-card" data-mascot-stage="auth-login">
    <div class="logo">
        <div class="logo-icon"><i class="fa-solid fa-share-nodes"></i></div>
        <h1>QuickShare</h1>
        <p data-i18n="loginSubtitle">Welcome back, sign in to continue</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label data-i18n="usernameLabel"><i class="fa-regular fa-user" style="margin-right:5px"></i> Username</label>
            <div class="input-wrap">
                <input type="text" id="username" placeholder="Enter username" data-i18n-placeholder="usernamePlaceholder" required autocomplete="username">
                <i class="fa-regular fa-user input-icon"></i>
            </div>
        </div>

        <div class="form-group">
            <label data-i18n="passwordLabel"><i class="fa-solid fa-lock" style="margin-right:5px"></i> Password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="Enter password" data-i18n-placeholder="passwordPlaceholder" required autocomplete="current-password">
                <i class="fa-solid fa-lock input-icon"></i>
            </div>
        </div>

        <button type="submit" class="btn" id="loginBtn">
            <span data-i18n="loginSubmit">Sign in</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>

    <div class="divider" id="socialDivider" style="display:none"><span data-i18n="or">or</span></div>

    <div class="social-buttons" id="socialButtons"></div>

    <div class="card-footer">
        <span data-i18n="noAccount">Don't have an account?</span>
        <a href="register.html" data-i18n="registerNow">Sign up</a>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>
<script src="js/login.js"></script>
<script src="js/social-login.js"></script>
<script src="js/mascots.js"></script>
<script src="js/spa-router.js"></script>

<script>
    initMascots();

    (function(){
        var orbs=document.querySelectorAll('.bg-orb');
        var mx=0.5,my=0.5;
        document.addEventListener('mousemove',function(e){
            mx=e.clientX/window.innerWidth;
            my=e.clientY/window.innerHeight;
        });
        function tick(){
            var factors=[80,60,45];
            for(var i=0;i<orbs.length;i++){
                var f=factors[i]||25;
                orbs[i].style.transform='translate('+((mx-0.5)*f)+'px,'+((my-0.5)*f)+'px)';
            }
            requestAnimationFrame(tick);
        }
        tick();
    })();
</script>
</body>
</html>
