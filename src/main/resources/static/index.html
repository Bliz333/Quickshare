<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="title">QuickShare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        (function() {
            var s = localStorage.getItem('quickshare-theme');
            if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches))
                document.documentElement.classList.add('dark-mode');
        })();
    </script>
    <script>
        (function() {
            document.documentElement.classList.add('lang-pending');
            var l = localStorage.getItem('quickshare-lang');
            if (l === 'en' || l === 'zh') document.documentElement.lang = l === 'en' ? 'en' : 'zh-CN';
        })();
    </script>

    <style>
        html.lang-pending body { opacity: 0; }
        html.lang-ready body  { opacity: 1; transition: opacity .15s ease; }

        /* ═══ Theme tokens ═══ */
        :root {
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #0f172a;
            --text2: #64748b;
            --text3: #94a3b8;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #e2e8f0;
            --sh-s: 0 1px 3px rgba(0,0,0,.06);
            --sh-m: 0 4px 16px rgba(0,0,0,.08);
            --sh-l: 0 12px 40px rgba(0,0,0,.12);
        }
        .dark-mode {
            --primary: #818cf8;
            --primary-light: #a5b4fc;
            --primary-dark: #6366f1;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --sh-s: 0 1px 3px rgba(0,0,0,.25);
            --sh-m: 0 4px 16px rgba(0,0,0,.35);
            --sh-l: 0 12px 40px rgba(0,0,0,.45);
        }

        /* ═══ Reset ═══ */
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

        body {
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background .3s, color .3s;
        }

        /* ═══ Top bar ═══ */
        .topbar {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
            z-index: 100;
        }
        .brand {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: -.02em;
        }
        .dark-mode .brand { color: var(--primary-light); }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .t-btn {
            width: 36px; height: 36px;
            border: none; border-radius: 50%;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            font-size: .85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            position: relative;
            font-family: inherit;
            font-weight: 600;
        }
        .t-btn:hover { background: var(--primary); color: #fff; }
        .t-btn.has-unread { color: var(--primary); }
        .t-btn-label {
            width: auto; padding: 0 12px;
            border-radius: 999px;
            font-size: .78rem;
            gap: 5px;
        }
        #authButtons {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        #authButtons .t-btn-label { font-size: .78rem; }
        .notif-dot {
            position: absolute; top: 2px; right: 2px;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #f97316;
            border: 2px solid var(--bg);
            display: none;
        }
        .notif-dot.on { display: block; }
        .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

        /* ═══ Arena (main) ═══ */
        .arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            gap: 28px;
            min-height: 0;
            overflow-y: auto;
        }

        /* ── Self device ── */
        .self {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .self-icon {
            width: 84px; height: 84px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.9rem;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.28), 0 4px 18px rgba(59,130,246,.18); }
            50%      { box-shadow: 0 0 0 14px rgba(59,130,246,0), 0 4px 18px rgba(59,130,246,.28); }
        }
        .dark-mode .self-icon { animation-name: pulse-d; }
        @keyframes pulse-d {
            0%,100% { box-shadow: 0 0 0 0 rgba(129,140,248,.28), 0 4px 18px rgba(129,140,248,.18); }
            50%      { box-shadow: 0 0 0 14px rgba(129,140,248,0), 0 4px 18px rgba(129,140,248,.28); }
        }
        .self-name {
            font-size: .95rem;
            font-weight: 600;
        }
        .self-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: .76rem;
            color: var(--text2);
        }
        .ws-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text3);
            transition: background .3s;
        }
        .ws-dot[data-status="connected"] { background: var(--success); }
        .ws-dot[data-status="disconnected"] { background: var(--danger); }

        /* ── Peer grid ── */
        .peers {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .peer-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }
        .peer-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            transition: all .2s;
            min-width: 170px;
            max-width: 250px;
            flex: 1 1 170px;
            appearance: none;
            -webkit-appearance: none;
            font-family: inherit;
            color: inherit;
            text-align: left;
            box-shadow: var(--sh-s);
        }
        .peer-card:hover {
            border-color: var(--primary);
            box-shadow: 0 6px 20px rgba(59,130,246,.14);
            transform: translateY(-2px);
        }
        .dark-mode .peer-card:hover {
            box-shadow: 0 6px 20px rgba(129,140,248,.18);
        }
        .peer-card:active { transform: translateY(0) scale(.98); }
        .peer-card.drag-over { border-color: var(--success); background: rgba(16,185,129,.06); }
        .peer-card.paired { border-color: var(--primary); background: rgba(59,130,246,.04); }
        .dark-mode .peer-card.paired { background: rgba(129,140,248,.08); }
        .peer-card-icon {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: rgba(59,130,246,.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.05rem;
            flex-shrink: 0;
        }
        .dark-mode .peer-card-icon { background: rgba(129,140,248,.14); }
        .peer-card-info { min-width: 0; flex: 1; }
        .peer-card-name {
            font-size: .86rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .peer-card-meta {
            font-size: .7rem;
            color: var(--text2);
            margin-top: 2px;
        }

        /* No peers hint */
        .no-peers {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
            padding: 20px;
            color: var(--text3);
        }
        .no-peers.show { display: flex; }
        .no-peers i { font-size: 1.4rem; opacity: .4; }
        .no-peers p { font-size: .82rem; line-height: 1.6; max-width: 260px; }

        /* ═══ Pair footer ═══ */
        .pair-footer {
            flex-shrink: 0;
            padding: 10px 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .pair-divider {
            font-size: .72rem;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 440px;
        }
        .pair-divider::before,.pair-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .pair-code-show {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            border-radius: 14px;
            background: rgba(59,130,246,.08);
            border: 1.5px solid rgba(59,130,246,.18);
        }
        .pair-code-show.visible { display: inline-flex; }
        .pair-code-value {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: .22em;
            color: var(--primary-dark);
            padding-left: .22em;
        }
        .dark-mode .pair-code-value { color: var(--primary-light); }
        .pair-code-copy {
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text2);
            font-size: .72rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all .2s;
        }
        .pair-code-copy:hover { border-color: var(--primary); color: var(--primary); }

        .pair-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 440px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .pair-input {
            flex: 1;
            min-width: 100px;
            max-width: 160px;
            height: 40px;
            padding: 0 14px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            font-size: .88rem;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            outline: none;
            transition: border-color .2s;
        }
        .pair-input:focus { border-color: var(--primary); }
        .pair-input::placeholder {
            letter-spacing: normal;
            text-transform: none;
            font-weight: 400;
            color: var(--text3);
        }
        .pair-btn {
            height: 40px;
            padding: 0 16px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .pair-btn-fill {
            background: var(--primary);
            color: #fff;
        }
        .pair-btn-fill:hover { opacity: .88; }
        .pair-btn-ghost {
            background: var(--card);
            color: var(--text2);
            border: 1.5px solid var(--border);
        }
        .pair-btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
        .pair-sep {
            color: var(--text3);
            font-size: .72rem;
            font-weight: 600;
        }

        /* ═══ Progress banner ═══ */
        .progress-banner {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 14px 20px 18px;
            background: var(--card);
            border-top: 1px solid var(--border);
            box-shadow: 0 -4px 20px rgba(0,0,0,.08);
            transform: translateY(100%);
            transition: transform .3s ease;
            z-index: 200;
        }
        .progress-banner.visible { transform: translateY(0); }
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 7px;
        }
        .progress-name {
            font-size: .84rem;
            font-weight: 600;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            flex: 1;
        }
        .progress-hint {
            font-size: .76rem;
            color: var(--text2);
            flex-shrink: 0;
        }
        .progress-track {
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 99px;
            width: 0;
            transition: width .35s ease;
        }

        /* ═══ Receive modal ═══ */
        .recv-overlay {
            position: fixed; inset: 0; z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15,23,42,.5);
            backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none;
            transition: opacity .25s;
            padding: 20px;
        }
        .recv-overlay.visible { opacity: 1; pointer-events: auto; }
        .recv-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 26px;
            width: 100%; max-width: 380px;
            box-shadow: var(--sh-l);
            transform: scale(.95) translateY(16px);
            transition: transform .35s cubic-bezier(.34,1.56,.64,1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .recv-overlay.visible .recv-card { transform: scale(1) translateY(0); }
        .recv-icon {
            width: 52px; height: 52px;
            border-radius: 16px;
            background: rgba(59,130,246,.1);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        .recv-label {
            font-size: .8rem;
            color: var(--text2);
        }
        .recv-name {
            font-size: 1rem;
            font-weight: 700;
            word-break: break-all;
            max-width: 280px;
            line-height: 1.35;
        }
        .recv-size {
            font-size: .8rem;
            color: var(--text2);
        }
        .recv-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            width: 100%;
        }
        .recv-dl {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 16px;
            background: var(--primary);
            color: #fff;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: .88rem;
            font-family: inherit;
            transition: opacity .2s;
        }
        .recv-dl:hover { opacity: .88; }
        .recv-sec {
            width: 44px; height: 44px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .95rem;
            transition: all .2s;
            flex-shrink: 0;
        }
        .recv-sec:hover { border-color: var(--primary); color: var(--primary); }

        /* ═══ Toast ═══ */
        .toast-container {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: .84rem;
            font-weight: 500;
            box-shadow: var(--sh-m);
            transform: translateY(16px);
            opacity: 0;
            transition: all .3s;
            pointer-events: auto;
            max-width: min(360px, 90vw);
            text-align: center;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error   { border-left: 3px solid var(--danger); }
        .toast.warning { border-left: 3px solid var(--warning); }
        .toast.info    { border-left: 3px solid var(--primary); }

        /* ═══ Notification panel (compatibility) ═══ */
        .home-notice-panel {
            position: fixed; top: 56px; right: 12px;
            width: min(400px, calc(100vw - 24px));
            max-height: min(70vh, 500px);
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--card);
            box-shadow: var(--sh-l);
            z-index: 200;
            opacity: 0; pointer-events: none;
            transform: translateY(-6px) scale(.98);
            transition: opacity .2s, transform .2s;
            overflow: hidden;
        }
        .home-notice-panel.open { opacity: 1; pointer-events: auto; transform: none; }
        .home-notice-header { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .home-notice-header-copy { min-width: 0; flex: 1; }
        .home-notice-header-actions { display: inline-flex; gap: 6px; flex-shrink: 0; }
        .home-notice-header h3 { font-size: .95rem; margin-bottom: 2px; }
        .home-notice-header p, .home-notice-login-hint, .home-notice-empty { color: var(--text2); font-size: .82rem; line-height: 1.6; }
        .home-notice-close, .home-notice-action {
            min-height: 32px; padding: 0 10px; border-radius: 8px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text2); cursor: pointer; font-family: inherit;
            font-size: .74rem; font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center; gap: 5px;
            transition: all .2s;
        }
        .home-notice-close:hover, .home-notice-action:hover { border-color: var(--primary); color: var(--primary); }
        .home-notice-action:disabled { opacity: .4; cursor: not-allowed; }
        .home-notice-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .home-notice-tab {
            border: 1px solid var(--border); background: var(--card); color: var(--text2);
            border-radius: 999px; padding: 6px 12px; font-size: .76rem;
            font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s;
        }
        .home-notice-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
        .home-notice-list { display: grid; gap: 10px; max-height: min(40vh, 320px); overflow-y: auto; }
        .home-notice-footer { margin-top: 10px; display: flex; justify-content: center; }
        .home-notice-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
        .home-notice-item h3 { font-size: .9rem; margin-bottom: 6px; }
        .home-notice-item p { color: var(--text2); font-size: .82rem; line-height: 1.6; white-space: pre-wrap; }
        .home-notice-body.collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .home-notice-meta { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; font-size: .72rem; color: var(--text2); }
        .home-notice-meta-actions { display: inline-flex; align-items: center; gap: 6px; }
        .home-notice-scope { display: inline-flex; align-items: center; justify-content: center; min-width: 60px; padding: 2px 8px; border-radius: 999px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; font-size: .68rem; }
        .home-notice-scope.all { color: #075985; background: rgba(14,165,233,.12); }
        .home-notice-scope.personal { color: #166534; background: rgba(16,185,129,.14); }
        .home-notice-item.read { opacity: .7; }
        .home-notice-item.read h3 { color: var(--text2); }
        .home-notice-mark-read { border: none; background: transparent; color: var(--primary-dark); font-size: .72rem; font-weight: 700; cursor: pointer; padding: 0; }
        .home-notice-mark-read:hover { color: var(--primary); }
        .dark-mode .home-notice-mark-read { color: var(--primary-light); }
        .home-notice-read-state { display: inline-flex; align-items: center; gap: 4px; font-size: .72rem; font-weight: 700; color: var(--success); }
        .home-notice-toggle-body { margin-top: 6px; border: none; background: transparent; color: var(--primary-dark); font-size: .72rem; font-weight: 700; cursor: pointer; padding: 0; }
        .dark-mode .home-notice-toggle-body { color: var(--primary-light); }

        /* ═══ Utilities ═══ */
        .hidden { display: none !important; }

        /* ═══ Responsive ═══ */
        @media (max-width: 480px) {
            .topbar { padding: 0 12px; }
            .pair-row { flex-direction: column; align-items: stretch; }
            .pair-input { max-width: none; }
            .pair-sep { display: none; }
            .peer-card { min-width: 0; max-width: none; flex-basis: 100%; }
        }
    </style>
</head>
<body>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══ Top bar ═══ -->
<header class="topbar">
    <span class="brand">QuickShare</span>
    <nav class="topbar-right">
        <button class="t-btn" id="homeNotificationButton" type="button" style="position:relative"
                aria-haspopup="dialog" aria-expanded="false" title="Notifications">
            <i class="fa-regular fa-bell"></i>
            <span class="sr-only" data-i18n="homeNoticeButton">Notifications</span>
            <span id="homeNotificationBadge" class="notif-dot"></span>
        </button>
        <button class="t-btn" onclick="location.href='netdisk.html'" title="Cloud Storage">
            <i class="fa-solid fa-hard-drive"></i>
        </button>
        <button class="t-btn" id="darkModeToggle" onclick="toggleTheme()" title="Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button class="t-btn t-btn-label" id="langBtn" onclick="toggleLanguage()">EN</button>
        <span id="authButtons">
            <button class="t-btn t-btn-label" onclick="location.href='login.html'" data-i18n="loginBtn">Login</button>
        </span>
    </nav>
</header>

<!-- ═══ Notification panel ═══ -->
<section id="homeNotificationsPanel" class="home-notice-panel" aria-hidden="true">
    <div class="home-notice-header">
        <div class="home-notice-header-copy">
            <h3 data-i18n="homeNoticeTitle">Notifications</h3>
            <p data-i18n="homeNoticeSubtitle">Platform announcements and personal messages.</p>
        </div>
        <div class="home-notice-header-actions">
            <button id="homeNoticeMarkAllBtn" class="home-notice-action" type="button">
                <i class="fa-solid fa-check-double"></i>
                <span data-i18n="homeNoticeMarkAllRead">Mark all read</span>
            </button>
            <button id="homeNoticeCloseBtn" class="home-notice-close" type="button" title="Close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>
    <div class="home-notice-tabs">
        <button id="homeNoticeTabAll" class="home-notice-tab active"
                onclick="switchHomeNotificationTab('all')" data-i18n="homeNoticeTabAll">All</button>
        <button id="homeNoticeTabPersonal" class="home-notice-tab"
                onclick="switchHomeNotificationTab('personal')" data-i18n="homeNoticeTabPersonal">Personal</button>
    </div>
    <p id="homeNoticeLoginHint" class="home-notice-login-hint" data-i18n="homeNoticeLoginHint">Log in to see personal notifications.</p>
    <div id="homeNoticeList" class="home-notice-list"></div>
    <div id="homeNoticeFooter" class="home-notice-footer" style="display:none">
        <button id="homeNoticeMoreBtn" class="home-notice-action" type="button"></button>
    </div>
    <p id="homeNoticeEmpty" class="home-notice-empty" style="display:none"></p>
</section>

<!-- ═══ Main arena ═══ -->
<main class="arena">
    <!-- Self device -->
    <div class="self">
        <div class="self-icon">
            <i class="fa-solid fa-laptop" id="selfDeviceIcon"></i>
        </div>
        <strong class="self-name" id="selfDeviceLabel">This device</strong>
        <span class="self-status">
            <span class="ws-dot" id="wsStatusDot" data-status="disconnected"></span>
            <span id="wsStatusText" data-i18n="homeWsConnecting">Connecting&hellip;</span>
        </span>
    </div>

    <!-- Peer devices -->
    <div class="peers">
        <div id="peerDevices" class="peer-grid"></div>
        <div class="no-peers" id="noDevicesHint">
            <i class="fa-solid fa-wifi"></i>
            <p data-i18n="homeNoDevices">Open this page on another device on the same network</p>
        </div>
    </div>
</main>

<!-- ═══ Pair code footer ═══ -->
<footer class="pair-footer">
    <div class="pair-divider" data-i18n="homePairDivider">Different network? Use a pair code</div>

    <div id="homePairCodeDisplay" class="pair-code-show">
        <span id="homePairCodeValue" class="pair-code-value">-</span>
        <button id="homeCopyPairCodeBtn" class="pair-code-copy" type="button" data-i18n="homeCopyPairCode">Copy</button>
    </div>

    <div class="pair-row">
        <input id="homePairCodeInput" class="pair-input" type="text" maxlength="6"
               placeholder="Pair code" data-i18n-placeholder="homePairCodePlaceholder">
        <button class="pair-btn pair-btn-fill" onclick="joinByPairCode()" data-i18n="homePairCodeJoin">Join</button>
        <span class="pair-sep" data-i18n="homePairOr">or</span>
        <button id="homeCreatePairCodeBtn" class="pair-btn pair-btn-ghost" data-i18n="homeCreatePairCode">
            <i class="fa-solid fa-plus"></i> Generate
        </button>
    </div>
</footer>

<!-- ═══ Transfer progress banner ═══ -->
<div id="homeTransferProgress" class="progress-banner">
    <div class="progress-header">
        <span id="homeTransferLabel" class="progress-name"></span>
        <span id="homeTransferHint" class="progress-hint"></span>
    </div>
    <div class="progress-track"><div id="homeTransferBar" class="progress-bar"></div></div>
</div>

<!-- ═══ Receive file modal ═══ -->
<div id="receiveModal" class="recv-overlay" role="dialog" aria-modal="true">
    <div class="recv-card">
        <div class="recv-icon"><i class="fa-solid fa-file-arrow-down"></i></div>
        <p class="recv-label" data-i18n="receiveFromLabel">File received</p>
        <h3 id="receiveFileName" class="recv-name">filename</h3>
        <p id="receiveFileSize" class="recv-size"></p>
        <div class="recv-actions">
            <a id="receiveDownloadBtn" class="recv-dl" href="#" download>
                <i class="fa-solid fa-download"></i>
                <span data-i18n="downloadBtn">Download</span>
            </a>
            <button id="receiveCopyLinkBtn" class="recv-sec" type="button" title="Copy link">
                <i class="fa-solid fa-link"></i>
            </button>
            <button id="receiveSaveBtn" class="recv-sec hidden" type="button" title="Save to cloud">
                <i class="fa-solid fa-hard-drive"></i>
            </button>
            <button class="recv-sec" onclick="closeReceiveCard()" title="Close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>
</div>

<!-- Hidden file input -->
<input type="file" id="homeFileInput" style="display:none">

<!-- ═══ Scripts ═══ -->
<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/theme.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/home-notifications.js"></script>
<script src="js/home.js"></script>

<script>
    /* Override auth rendering for compact topbar */
    (function() {
        var _orig = window.renderLoggedInState;
        window.renderLoggedInState = function(user) {
            var el = document.getElementById('authButtons');
            if (!el) return _orig ? _orig(user) : undefined;
            var name = user.nickname || user.username || '';
            var lang = typeof getCurrentLanguage === 'function' ? getCurrentLanguage() : 'zh';
            el.innerHTML =
                '<span style="font-size:.8rem;font-weight:600;padding:0 4px">' + name + '</span>' +
                '<button class="t-btn t-btn-label" onclick="handleLogout()" title="' +
                (lang === 'zh' ? '退出' : 'Logout') + '">' +
                '<i class="fa-solid fa-right-from-bracket"></i></button>';
        };
    })();

    window.addEventListener('load', function() {
        Promise.resolve(checkLoginState()).finally(function() {
            initHomeNotifications();
        });
    });
</script>
</body>
</html>
