<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="title">我的网盘 - QuickShare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 防止主题闪烁 -->
    <script>
        (function() {
            const saved = localStorage.getItem('quickshare-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <script>
        (function(){document.documentElement.classList.add('lang-pending');
        var l=localStorage.getItem('quickshare-lang');
        if(l==='en'||l==='zh')document.documentElement.lang=l==='en'?'en':'zh-CN'})();
    </script>

    <style>
        /* ==================== 主题变量 ==================== */
        :root {
            --primary: #0ea5e9;
            --primary-light: #38bdf8;
            --primary-dark: #0284c7;
            --accent: #06b6d4;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --bg-light: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        .dark-mode {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #f87171;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --bg-light: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --glass-bg: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }
        html.lang-pending body{opacity:0}
        html.lang-ready body{opacity:1;transition:opacity .18s ease}

        .bg-glow { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; opacity: 0.15; pointer-events: none; }
        .blob { position: absolute; filter: blur(120px); opacity: 0.4; border-radius: 50%; animation: float 25s infinite alternate; }
        .blob-1 { top: -15%; left: -15%; width: 45vw; height: 45vw; background: var(--primary-light); animation-delay: 0s; }
        .blob-2 { bottom: -15%; right: -15%; width: 45vw; height: 45vw; background: var(--accent); animation-delay: -5s; }
        .blob-3 { top: 50%; left: 40%; width: 35vw; height: 35vw; background: var(--primary); opacity: 0.25; animation-delay: -10s; }

        @keyframes float { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(50px, 50px) rotate(20deg); } }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-sub); }

        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }

        .selection-mode-toggle.is-active {
            color: var(--primary-dark);
            border-color: rgba(14, 165, 233, 0.35);
            background: rgba(14, 165, 233, 0.08);
        }

        .dark-mode .selection-mode-toggle.is-active {
            color: var(--primary-light);
            border-color: rgba(129, 140, 248, 0.4);
            background: rgba(99, 102, 241, 0.16);
        }

        .netdisk-drop-target.is-over,
        .netdisk-drop-root.is-over {
            border-color: rgba(14, 165, 233, 0.6) !important;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.14);
            background: rgba(14, 165, 233, 0.08) !important;
        }

        .dark-mode .netdisk-drop-target.is-over,
        .dark-mode .netdisk-drop-root.is-over {
            border-color: rgba(129, 140, 248, 0.55) !important;
            box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.18);
            background: rgba(99, 102, 241, 0.14) !important;
        }

        .preview-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center; justify-content: center;
        }
        .preview-modal.active { display: flex; }
        .preview-content { max-width: 90%; max-height: 90%; position: relative; }
        .preview-close {
            position: absolute; top: 20px; right: 20px;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.1); color: #fff;
            border: none; cursor: pointer; font-size: 1.2rem;
            transition: all 0.3s; z-index: 1010;
        }
        .preview-close:hover { background: var(--primary); transform: rotate(90deg); }
        .preview-image { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 12px; }
        .preview-video { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
        .preview-text {
            background: var(--bg-card); color: var(--text-main);
            padding: 30px; border-radius: 12px;
            max-width: 800px; max-height: 80vh;
            overflow-y: auto; white-space: pre-wrap;
            font-family: monospace;
        }
        .preview-unsupported {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 40px;
            border-radius: 16px; text-align: center;
        }

        .action-dialog {
            display: flex;
            position: fixed;
            inset: 0;
            z-index: 1200;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            background:
                radial-gradient(circle at top, rgba(14, 165, 233, 0.16), transparent 42%),
                rgba(15, 23, 42, 0.52);
            backdrop-filter: blur(14px) saturate(118%);
            transition: opacity 0.28s ease, visibility 0s linear 0.28s;
        }

        .action-dialog.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transition: opacity 0.32s ease;
        }

        .dialog-panel {
            position: relative;
            width: min(560px, 100%);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.94));
            background-color: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(22px);
            border-radius: 28px;
            box-shadow: 0 34px 90px rgba(15, 23, 42, 0.24);
            overflow: hidden;
            transform: translateY(24px) scale(0.96);
            opacity: 0;
            transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease;
        }

        .dark-mode .dialog-panel {
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.88), rgba(30, 41, 59, 0.94));
        }

        .action-dialog.active .dialog-panel {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .dialog-panel::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.3), transparent 72%);
            pointer-events: none;
        }

        .dark-mode .dialog-panel::before {
            background: radial-gradient(circle, rgba(129, 140, 248, 0.3), transparent 72%);
        }

        .dialog-header {
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 24px 24px 0;
        }

        .dialog-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(14, 165, 233, 0.12);
            color: var(--primary-dark);
            font-size: 1.15rem;
        }

        .dark-mode .dialog-icon {
            background: rgba(99, 102, 241, 0.18);
            color: var(--primary-light);
        }

        .dialog-icon.danger {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
        }

        .dialog-close {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.45);
            color: var(--text-sub);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dark-mode .dialog-close {
            background: rgba(15, 23, 42, 0.5);
        }

        .dialog-close:hover {
            color: var(--text-main);
            border-color: var(--primary);
            background: rgba(14, 165, 233, 0.1);
            transform: translateY(-1px);
        }

        .dialog-body {
            padding: 20px 24px 24px;
        }

        .dialog-title {
            font-size: 1.3rem;
            font-weight: 650;
            color: var(--text-main);
            line-height: 1.2;
        }

        .dialog-description {
            margin-top: 8px;
            color: var(--text-sub);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .dialog-content {
            margin-top: 20px;
            display: grid;
            gap: 16px;
        }

        .dialog-field label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.84rem;
            font-weight: 600;
            color: var(--text-sub);
        }

        .dialog-field input,
        .dialog-field select,
        .dialog-field textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.62);
            color: var(--text-main);
            border-radius: 16px;
            padding: 12px 14px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-family: 'Outfit', sans-serif;
        }

        .dialog-field textarea {
            min-height: 120px;
            resize: vertical;
        }

        .dark-mode .dialog-field input,
        .dark-mode .dialog-field select,
        .dark-mode .dialog-field textarea {
            background: rgba(15, 23, 42, 0.58);
        }

        .dialog-field input:focus,
        .dialog-field select:focus,
        .dialog-field textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        .dark-mode .dialog-field input:focus,
        .dark-mode .dialog-field select:focus,
        .dark-mode .dialog-field textarea:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
        }

        .dialog-help {
            margin-top: 8px;
            color: var(--text-sub);
            font-size: 0.82rem;
            line-height: 1.6;
        }

        .dialog-inline-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .dialog-surface {
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.42);
            border-radius: 18px;
            padding: 16px;
        }

        .dark-mode .dialog-surface {
            background: rgba(15, 23, 42, 0.42);
        }

        .dialog-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .dialog-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(14, 165, 233, 0.1);
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 600;
        }

        .dark-mode .dialog-chip {
            background: rgba(99, 102, 241, 0.18);
            color: var(--primary-light);
        }

        .dialog-note {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px dashed rgba(14, 165, 233, 0.28);
            background: rgba(14, 165, 233, 0.06);
            color: var(--text-sub);
            font-size: 0.88rem;
            line-height: 1.7;
        }

        .dark-mode .dialog-note {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
        }

        .dialog-note i {
            color: var(--primary);
            margin-top: 2px;
        }

        .dialog-error {
            display: none;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            font-size: 0.88rem;
            line-height: 1.6;
        }

        .dialog-error.show {
            display: block;
        }

        .dialog-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .dialog-btn {
            min-width: 108px;
            min-height: 42px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.55);
            color: var(--text-main);
            font-size: 0.92rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .dark-mode .dialog-btn {
            background: rgba(15, 23, 42, 0.58);
        }

        .dialog-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: var(--primary);
            background: rgba(14, 165, 233, 0.1);
        }

        .dialog-btn.primary {
            color: white;
            border-color: transparent;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            box-shadow: 0 14px 28px rgba(14, 165, 233, 0.22);
        }

        .dialog-btn.danger {
            color: white;
            border-color: transparent;
            background: linear-gradient(135deg, #f97316, var(--danger));
            box-shadow: 0 14px 28px rgba(239, 68, 68, 0.22);
        }

        .dialog-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .share-result-link {
            display: block;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            word-break: break-all;
            line-height: 1.6;
        }

        .dark-mode .share-result-link {
            background: rgba(15, 23, 42, 0.58);
        }

        @media (max-width: 640px) {
            .action-dialog {
                padding: 12px;
            }

            .dialog-panel {
                border-radius: 22px;
            }

            .dialog-header,
            .dialog-body {
                padding-left: 18px;
                padding-right: 18px;
            }

            .dialog-inline-grid {
                grid-template-columns: 1fr;
            }

            .dialog-actions {
                flex-direction: column-reverse;
            }

            .dialog-btn {
                width: 100%;
            }
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 256px;  /* 侧边栏宽度 w-64 = 16rem = 256px */
            width: calc(100% - 256px);
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 55;
        }

        .mobile-overlay.active { display: block; }

        main.blur-content { filter: blur(2px); transition: filter 0.3s ease; }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed; top: 0; left: 0; height: 100vh;
                transform: translateX(-100%);
                background: var(--bg-card);
                z-index: 60; transition: transform 0.3s ease;
                border-right: 1px solid var(--border-color);
            }
            .sidebar.active { transform: translateX(0); }
        }

        button, .cursor-pointer { touch-action: manipulation; }

        .mask-image-linear {
            mask-image: linear-gradient(to right, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
        }

        /* 图标过渡 */
        #transferIcon {
            /* 保持原大小 */
            width: 1.25rem;
            height: 1.25rem;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* 弹性效果 */
            transform-origin: center;
        }

        /* 图标激活态类名 */
        #transferIcon.is-active {
            transform: scale(1.24); /* 1.55 / 1.25 ≈ 1.24 倍 */
        }

        /* 角标过渡 */
        #transferCount {
            display: flex; /* 一直保持 flex，通过透明度隐藏 */
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
            opacity: 0;
            transform: scale(0);
        }

        /* 角标激活态类名 */
        #transferCount.is-visible {
            opacity: 1;
            transform: scale(1);
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary)',
                        'primary-light': 'var(--primary-light)',
                        'primary-dark': 'var(--primary-dark)',
                        page: 'var(--bg-light)',
                        card: 'var(--bg-card)',
                        border: 'var(--border-color)',
                        text: {
                            main: 'var(--text-main)',
                            sub: 'var(--text-sub)'
                        },
                        brand: {
                            50: 'rgba(14, 165, 233, 0.1)',
                            100: 'rgba(14, 165, 233, 0.15)',
                            500: 'var(--primary)',
                            600: 'var(--primary-dark)',
                            700: 'var(--primary-dark)',
                            900: '#1E3A8A',
                        },
                        ai: {
                            500: '#8B5CF6',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-page text-text-main h-screen flex overflow-hidden selection:bg-brand-100 selection:text-brand-700">

<div class="bg-glow">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="mobile-overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="w-64 bg-card border-r border-border flex flex-col shrink-0 z-20 sidebar transition-colors duration-300">
    <a href="index.html" class="h-16 flex items-center px-6 border-b border-border group">
        <div class="w-8 h-8 bg-gradient-to-br from-brand-500 to-ai-500 rounded-lg flex items-center justify-center text-white mr-3 shadow-md shadow-brand-500/20 transition-transform group-hover:-translate-y-0.5">
            <i class="fa-solid fa-cloud"></i>
        </div>
        <span class="font-bold text-lg tracking-tight text-text-main hover:text-brand-600 transition-colors">QuickShare</span>
    </a>

    <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto">
        <div class="px-2 mb-6">
            <button onclick="document.getElementById('fileUpload').click()" class="w-full bg-brand-500 hover:bg-brand-600 text-white shadow-lg shadow-brand-500/30 transition-all py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 font-medium group">
                <i class="fa-solid fa-plus group-hover:rotate-90 transition-transform"></i>
                <span data-i18n="uploadBtn">上传文件</span>
            </button>
            <input type="file" id="fileUpload" class="hidden" multiple onchange="handleFileUpload(event)">
        </div>

        <a href="javascript:void(0)" data-category="all" class="flex items-center gap-3 px-4 py-2.5 bg-brand-50 text-brand-600 rounded-lg font-medium transition-colors sidebar-item active" onclick="showCategory(event, 'all')">
            <i class="fa-solid fa-folder-open w-5 text-center"></i>
            <span data-i18n="allFiles">全部文件</span>
        </a>
        <a href="javascript:void(0)" data-category="image" class="flex items-center gap-3 px-4 py-2.5 text-text-sub hover:bg-brand-50 hover:text-text-main rounded-lg transition-colors sidebar-item" onclick="showCategory(event, 'image')">
            <i class="fa-regular fa-image w-5 text-center"></i>
            <span data-i18n="images">图片</span>
        </a>
        <a href="javascript:void(0)" data-category="document" class="flex items-center gap-3 px-4 py-2.5 text-text-sub hover:bg-brand-50 hover:text-text-main rounded-lg transition-colors sidebar-item" onclick="showCategory(event, 'document')">
            <i class="fa-regular fa-file-lines w-5 text-center"></i>
            <span data-i18n="documents">文档</span>
        </a>
        <a href="javascript:void(0)" data-category="video" class="flex items-center gap-3 px-4 py-2.5 text-text-sub hover:bg-brand-50 hover:text-text-main rounded-lg transition-colors sidebar-item" onclick="showCategory(event, 'video')">
            <i class="fa-solid fa-film w-5 text-center"></i>
            <span data-i18n="videos">视频</span>
        </a>
        <a href="javascript:void(0)" data-category="audio" class="flex items-center gap-3 px-4 py-2.5 text-text-sub hover:bg-brand-50 hover:text-text-main rounded-lg transition-colors sidebar-item" onclick="showCategory(event, 'audio')">
            <i class="fa-solid fa-music w-5 text-center"></i>
            <span data-i18n="audios">音频</span>
        </a>
        <a href="javascript:void(0)" data-category="other" class="flex items-center gap-3 px-4 py-2.5 text-text-sub hover:bg-brand-50 hover:text-text-main rounded-lg transition-colors sidebar-item" onclick="showCategory(event, 'other')">
            <i class="fa-solid fa-box-archive w-5 text-center"></i>
            <span data-i18n="others">其他</span>
        </a>
    </nav>

    <div class="p-4 border-t border-border bg-page/50">
        <button onclick="createFolder()" class="w-full mb-3 bg-card border border-border hover:border-brand-500 text-text-sub hover:text-brand-500 py-2 px-4 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-colors">
            <i class="fa-solid fa-folder-plus"></i>
            <span data-i18n="newFolderBtn">新建文件夹</span>
        </button>

        <div class="flex items-center gap-3 pt-2 cursor-pointer hover:opacity-80">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" alt="User" class="w-8 h-8 rounded-full bg-card p-0.5 border border-border">
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-text-main truncate" id="userName">用户名</p>
                <p class="text-xs text-text-sub truncate" id="userVipStatus"></p>
            </div>
            <button onclick="handleLogout()" class="text-text-sub hover:text-text-main" title="退出">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>

        <!-- Quota Display -->
        <div id="quotaSection" class="mt-3 space-y-2" style="display:none;">
            <div>
                <div class="flex justify-between text-xs text-text-sub mb-1">
                    <span data-i18n="quotaStorage">存储空间</span>
                    <span id="quotaStorageText">-</span>
                </div>
                <div class="w-full h-1.5 bg-border rounded-full overflow-hidden">
                    <div id="quotaStorageBar" class="h-full bg-brand-500 rounded-full transition-all" style="width:0%"></div>
                </div>
            </div>
            <div class="flex justify-between text-xs text-text-sub">
                <span><span data-i18n="quotaDownloads">下载次数</span> (<span data-i18n="quotaMonthly">本月</span>)</span>
                <span id="quotaDownloadsText">-</span>
            </div>
            <a href="pricing.html" class="block text-center text-xs text-brand-500 hover:text-brand-600 font-medium pt-1" data-i18n="quotaUpgrade">升级套餐</a>
        </div>
    </div>
</aside>

<!-- Main -->
<main class="flex-1 flex flex-col min-w-0 bg-transparent transition-all duration-300 relative z-10">
    <header class="h-16 md:h-16 border-b border-border flex items-center justify-between px-4 md:px-6 shrink-0 glass-effect sticky top-0 z-20">
        <div class="flex items-center gap-3 md:gap-4 overflow-hidden flex-1">
            <button class="md:hidden p-2 -ml-2 hover:bg-brand-50 rounded-lg text-text-sub" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars text-lg"></i>
            </button>

            <div class="flex items-center text-sm text-text-sub overflow-hidden whitespace-nowrap mask-image-linear w-full">
                <span class="hover:text-brand-600 cursor-pointer hover:underline shrink-0 rounded-md border border-transparent px-2 py-1 transition-colors netdisk-drop-root" onclick="navigateToFolder(0)" ondragover="handleNetdiskDragOver(event, 0)" ondragleave="handleNetdiskDragLeave(event)" ondrop="handleNetdiskDrop(event, 0)" data-i18n="allFilesPath">全部文件</span>
                <span id="breadcrumbPath" class="flex items-center"></span>
            </div>
        </div>

        <div class="hidden md:block flex-1 max-w-xl mx-8 relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-text-sub opacity-50"></i>
            <input type="text" id="searchInput" data-i18n="searchPlaceholder" placeholder="搜索文件..."
                   class="w-full bg-page/50 border border-border text-text-main text-sm rounded-lg focus:ring-2 focus:ring-brand-100 focus:border-brand-500 block pl-10 p-2.5 transition-all placeholder-text-sub/50"
                   onkeyup="handleSearch(event)">
        </div>

        <div class="flex items-center gap-2 md:gap-4 text-text-sub shrink-0 ml-2">
            <button class="hidden md:block p-2 hover:bg-brand-50 rounded-lg transition-colors" onclick="location.href='index.html'" title="分享首页">
                <i class="fa-solid fa-share-nodes"></i>
            </button>
            <div class="relative">
                <button class="p-2 hover:bg-brand-50 rounded-lg transition-colors w-8 h-8 flex flex-col items-center justify-center" onclick="toggleTransferPanel()" id="transferBtn" title="文件传输">
                    <!-- 传输图标 - 单边箭头粗线圆角版 -->
                    <svg id="transferIcon" class="w-5 h-5 transition-all duration-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                        <!-- 左边上传：长竖线 + 左单边箭头 -->
                        <line x1="8" y1="21" x2="8" y2="3" class="text-text-sub"/>
                        <polyline points="4,7 8,3" class="text-text-sub"/>
                        <!-- 右边下载：长竖线 + 右单边箭头 -->
                        <line x1="16" y1="3" x2="16" y2="21" class="text-text-sub"/>
                        <polyline points="20,17 16,21" class="text-text-sub"/>
                    </svg>
                    <!-- 底部进度条 - 默认隐藏 -->
                    <div id="transferProgressWrap" class="w-6 h-1 bg-border rounded-full overflow-hidden mt-0.5 hidden transition-all duration-300">
                        <div id="transferProgressBar" class="h-full bg-brand-500 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </button>
                <!-- 任务数量徽章 -->
                <span id="transferCount" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-[10px] rounded-full hidden items-center justify-center font-bold shadow-sm border border-white">0</span>
            </div>
            <button class="p-2 hover:bg-brand-50 rounded-lg transition-colors w-8 h-8 flex items-center justify-center" onclick="toggleTheme()" id="darkModeToggle" title="切换主题">
                <i class="fa-solid fa-moon"></i>
            </button>


            <button class="p-2 hover:bg-brand-50 rounded-lg transition-colors text-xs font-bold w-8 h-8 flex items-center justify-center border border-border" onclick="toggleLanguage()" id="langBtn">EN</button>

            <div class="hidden md:block h-4 w-px bg-border"></div>

            <div class="flex bg-page/80 rounded-lg p-0.5 border border-border">
                <button class="p-1.5 md:p-2 rounded-md transition-colors view-btn active" onclick="switchView('list')" title="列表视图">
                    <i class="fa-solid fa-list text-xs md:text-sm"></i>
                </button>
                <button class="p-1.5 md:p-2 rounded-md transition-colors view-btn" onclick="switchView('grid')" title="网格视图">
                    <i class="fa-solid fa-grip text-xs md:text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-3 md:p-6 scroll-smooth">
        <div class="mb-6 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
            <h3 class="text-sm font-semibold text-text-sub" id="currentViewTitle">文件夹和文件</h3>
            <div class="flex w-full flex-col gap-2 sm:flex-row sm:items-center sm:justify-end md:w-auto">
                <button class="selection-mode-toggle h-10 min-w-[92px] rounded-lg border border-border bg-card px-3 text-sm font-semibold transition-colors hover:bg-brand-50 flex items-center justify-center gap-2" onclick="toggleNetdiskSelectionMode()" id="selectionModeToggle" title="选择">
                    <i class="fa-regular fa-square-check"></i>
                    <span id="selectionModeToggleText" data-i18n="selectionModeStart">选择</span>
                </button>
                <select class="w-full bg-card border border-border text-text-main text-sm rounded-lg px-3 py-2 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none sm:w-auto" onchange="sortFiles(this.value)" id="sortSelect">
                    <option value="name" data-i18n="sortByName">按名称排序</option>
                    <option value="time" data-i18n="sortByTime">按时间排序</option>
                    <option value="size" data-i18n="sortBySize">按大小排序</option>
                    <option value="type" data-i18n="sortByType">按类型排序</option>
                </select>
            </div>
        </div>

        <div id="bulkActionsBar" class="hidden mb-4 rounded-2xl border border-brand-200/70 bg-brand-50/70 px-4 py-3 backdrop-blur-sm">
            <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                <div class="flex flex-wrap items-center gap-2 text-sm">
                    <span id="selectedCountText" class="font-semibold text-brand-700">已选择 0 项</span>
                    <button id="selectAllVisibleBtn" type="button" class="inline-flex items-center gap-2 rounded-full border border-brand-200 bg-white/80 px-3 py-1.5 text-xs font-medium text-brand-700 transition-colors hover:border-brand-400 hover:text-brand-800" onclick="toggleSelectAllVisibleItems()">
                        <i class="fa-solid fa-check-double"></i>
                        <span data-i18n="batchSelectAllVisible">全选当前列表</span>
                    </button>
                </div>
                <div class="flex flex-wrap items-center gap-2">
                    <button id="batchMoveBtn" type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-card px-3 py-2 text-xs font-medium text-text-main transition-colors hover:border-brand-400 hover:text-brand-700 disabled:cursor-not-allowed disabled:opacity-50" onclick="batchMoveSelected()">
                        <i class="fa-solid fa-arrow-right-arrow-left"></i>
                        <span data-i18n="batchMoveSelected">批量移动</span>
                    </button>
                    <button id="batchDeleteBtn" type="button" class="inline-flex items-center gap-2 rounded-full border border-red-200 bg-white px-3 py-2 text-xs font-medium text-red-600 transition-colors hover:border-red-300 hover:text-red-700 disabled:cursor-not-allowed disabled:opacity-50" onclick="batchDeleteSelected()">
                        <i class="fa-solid fa-trash"></i>
                        <span data-i18n="batchDeleteSelected">批量删除</span>
                    </button>
                    <button id="clearSelectionBtn" type="button" class="inline-flex items-center gap-2 rounded-full border border-border bg-card px-3 py-2 text-xs font-medium text-text-sub transition-colors hover:border-brand-300 hover:text-text-main" onclick="clearNetdiskSelection()">
                        <i class="fa-solid fa-xmark"></i>
                        <span data-i18n="batchClearSelection">取消选择</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="listView">
            <div class="bg-card/80 backdrop-blur-sm border border-border rounded-xl overflow-hidden shadow-sm">
                <div class="grid grid-cols-12 gap-4 p-4 border-b border-border text-xs font-medium text-text-sub uppercase bg-page/50">
                    <div class="col-span-6" data-i18n="name">名称</div>
                    <div class="col-span-2" data-i18n="size">大小</div>
                    <div class="col-span-3" data-i18n="modifiedTime">修改时间</div>
                    <div class="col-span-1 text-right" data-i18n="actions">操作</div>
                </div>
                <div id="listContent"></div>
            </div>
        </div>

        <div id="gridView" class="hidden grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4"></div>

        <div id="emptyState" class="hidden text-center py-20">
            <div class="text-6xl text-brand-100 mb-4 animate-bounce"><i class="fa-regular fa-folder-open"></i></div>
            <h3 class="text-lg font-semibold text-text-main mb-2" data-i18n="emptyStateTitle">暂无文件</h3>
            <p class="text-text-sub" data-i18n="emptyStateText">上传您的第一个文件吧!</p>
        </div>
    </div>
</main>

<div id="previewModal" class="preview-modal" onclick="closePreview()">
    <button class="preview-close" onclick="closePreview()"><i class="fa-solid fa-xmark"></i></button>
    <div class="preview-content" onclick="event.stopPropagation()">
        <div id="previewContainer"></div>
    </div>
</div>

<div id="actionDialog" class="action-dialog" onclick="closeActionDialog()">
    <div class="dialog-panel" onclick="event.stopPropagation()">
        <div class="dialog-header">
            <div class="flex items-start gap-4 min-w-0">
                <div id="actionDialogIcon" class="dialog-icon">
                    <i class="fa-solid fa-pen"></i>
                </div>
                <div class="min-w-0">
                    <h3 id="actionDialogTitle" class="dialog-title">操作</h3>
                    <p id="actionDialogDescription" class="dialog-description"></p>
                </div>
            </div>
            <button type="button" class="dialog-close" onclick="closeActionDialog()" aria-label="Close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="dialog-body">
            <div id="actionDialogContent" class="dialog-content"></div>
            <div id="actionDialogError" class="dialog-error"></div>
            <div id="actionDialogActions" class="dialog-actions"></div>
        </div>
    </div>
</div>

<!-- 移动端上传按钮 -->
<button onclick="document.getElementById('fileUpload').click()" class="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-brand-600 text-white rounded-full shadow-lg shadow-brand-600/40 flex items-center justify-center text-xl z-40 hover:scale-105 transition-transform active:scale-95">
    <i class="fa-solid fa-plus"></i>
</button>

<!-- JS 文件 -->
<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/nav.js"></script>
<script src="js/theme.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/modal.js"></script>
<script src="js/netdisk.js"></script>
<script src="js/netdisk-render.js"></script>
<script src="js/transfer.js"></script>

</body>
</html>
