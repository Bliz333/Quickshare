<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="transferPublicPageTitle">QuickShare - Share</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        (function(){
            var s=localStorage.getItem('quickshare-theme');
            if(s==='dark'||(!s&&window.matchMedia('(prefers-color-scheme:dark)').matches))
                document.documentElement.classList.add('dark-mode');
        })();
    </script>
    <script>
        (function(){
            document.documentElement.classList.add('lang-pending');
            var l=localStorage.getItem('quickshare-lang');
            if(l==='en'||l==='zh') document.documentElement.lang=l==='en'?'en':'zh-CN';
        })();
    </script>

    <style>
        html.lang-pending body{opacity:0}
        html.lang-ready body{opacity:1;transition:opacity .15s ease}

        :root{
            --primary:#3b82f6;--primary-light:#60a5fa;--primary-dark:#2563eb;
            --success:#10b981;--danger:#ef4444;--warning:#f59e0b;
            --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
            --bg:#f0f4fa;--card:#ffffff;--border:rgba(148,163,184,.16);--border-s:rgba(148,163,184,.26);
            --sh-s:0 1px 3px rgba(0,0,0,.04);--sh-m:0 8px 28px rgba(15,23,42,.06);--sh-l:0 20px 60px rgba(15,23,42,.1);
            --mouse-x:50%;--mouse-y:50%
        }
        .dark-mode{
            --primary:#7c8cf5;--primary-light:#9ba5f8;--primary-dark:#6366f1;
            --text:#ececf1;--text2:#8b8b97;--text3:#5c5c66;
            --bg:#101012;--card:rgba(24,24,27,.85);--border:rgba(255,255,255,.06);--border-s:rgba(255,255,255,.1);
            --sh-s:0 1px 3px rgba(0,0,0,.4);--sh-m:0 8px 28px rgba(0,0,0,.4);--sh-l:0 20px 60px rgba(0,0,0,.5)
        }

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

        body{
            font-family:'Outfit',system-ui,-apple-system,sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100dvh;display:flex;flex-direction:column;
            transition:background .3s,color .3s
        }

        /* ═══ Topbar ═══ */
        .topbar{
            height:52px;display:flex;align-items:center;justify-content:space-between;
            padding:0 16px;flex-shrink:0;z-index:100
        }
        .brand{font-size:1.05rem;font-weight:700;color:var(--primary-dark);letter-spacing:-.02em;text-decoration:none}
        .dark-mode .brand{color:var(--primary-light)}
        .topbar-right{display:flex;align-items:center;gap:2px}
        .t-btn{
            width:36px;height:36px;border:none;border-radius:50%;background:transparent;
            color:var(--text2);cursor:pointer;font-size:.85rem;
            display:inline-flex;align-items:center;justify-content:center;
            transition:all .2s;position:relative;font-family:inherit;font-weight:600
        }
        .t-btn:hover{background:var(--primary);color:#fff}
        .t-btn-label{width:auto;padding:0 12px;border-radius:999px;font-size:.78rem;gap:5px}
        #authButtons{display:inline-flex;align-items:center;gap:4px}
        .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

        /* ═══ Main shell ═══ */
        .shell{
            flex:1;display:flex;flex-direction:column;align-items:center;
            padding:8px 16px 24px;overflow-y:auto
        }

        /* ═══ Tab toggle ═══ */
        .tab-bar{
            display:inline-flex;border-radius:14px;padding:4px;
            background:var(--card);border:1.5px solid var(--border);
            box-shadow:var(--sh-s);margin-bottom:20px;flex-shrink:0
        }
        .tab{
            min-height:38px;padding:0 20px;border:none;border-radius:11px;
            background:transparent;color:var(--text2);font-family:inherit;
            font-size:.84rem;font-weight:600;cursor:pointer;
            display:inline-flex;align-items:center;gap:7px;transition:all .2s
        }
        .tab:hover{color:var(--text)}
        .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.25)}
        .dark-mode .tab.active{box-shadow:0 2px 8px rgba(129,140,248,.3)}

        /* ═══ Tab content ═══ */
        .tab-content{display:none;width:100%;max-width:520px;animation:fadeUp .3s ease}
        .tab-content.active{display:block}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        /* ═══ Card ═══ */
        .card{
            position:relative;overflow:hidden;border-radius:22px;
            border:1.5px solid var(--border);background:var(--card);
            box-shadow:var(--sh-m);padding:24px
        }
        .card::before{
            content:'';position:absolute;inset:0;border-radius:inherit;
            background:radial-gradient(circle at var(--mouse-x) var(--mouse-y),rgba(59,130,246,.06),transparent 60%);
            opacity:0;transition:opacity .25s;pointer-events:none
        }
        .card:hover::before{opacity:1}

        /* ═══ Upload zone ═══ */
        .upload-area{
            border:2px dashed var(--border);border-radius:18px;
            padding:36px 20px;text-align:center;cursor:pointer;
            transition:all .25s;background:rgba(59,130,246,.03)
        }
        .upload-area:hover,.upload-area.dragover{
            border-color:var(--primary);background:rgba(59,130,246,.07);
            transform:scale(1.005)
        }
        .upload-area.dragover{border-style:solid}
        .upload-icon{
            width:56px;height:56px;margin:0 auto 14px;border-radius:16px;
            background:rgba(59,130,246,.1);color:var(--primary);
            display:flex;align-items:center;justify-content:center;font-size:1.5rem
        }
        .dark-mode .upload-icon{background:rgba(129,140,248,.14)}
        .upload-title{font-size:.95rem;font-weight:600;margin-bottom:4px}
        .upload-hint{font-size:.78rem;color:var(--text3);line-height:1.5}

        /* ═══ File list ═══ */
        .file-list{margin-top:14px}
        .file-list h4{font-size:.82rem;color:var(--text2);font-weight:600;margin-bottom:8px}
        .file-item{
            display:flex;justify-content:space-between;align-items:center;gap:10px;
            padding:10px 12px;border-radius:12px;border:1px solid var(--border);margin-bottom:6px
        }
        .file-item-info{display:grid;gap:2px;min-width:0}
        .file-item-info strong,.file-item-info small{
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.82rem
        }
        .file-item-info small{color:var(--text3);font-size:.72rem}
        .remove-file-btn{
            border:none;background:transparent;color:var(--text3);cursor:pointer;
            width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
            transition:all .2s;flex-shrink:0
        }
        .remove-file-btn:hover{background:rgba(239,68,68,.1);color:var(--danger)}

        /* ═══ Picker buttons ═══ */
        .pick-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
        .pick-btn{
            height:38px;padding:0 16px;border:1.5px solid var(--border);border-radius:12px;
            background:var(--card);color:var(--text2);font-family:inherit;
            font-size:.8rem;font-weight:600;cursor:pointer;
            display:inline-flex;align-items:center;gap:6px;transition:all .2s
        }
        .pick-btn:hover{border-color:var(--primary);color:var(--primary)}

        /* ═══ Settings ═══ */
        .settings{margin-top:18px;display:grid;gap:12px}
        .settings-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .field label{display:block;font-size:.76rem;font-weight:600;color:var(--text2);margin-bottom:5px}
        .field input,.field select{
            width:100%;height:42px;padding:0 12px;border:1.5px solid var(--border);
            border-radius:12px;background:var(--card);color:var(--text);
            font-family:inherit;font-size:.86rem;outline:none;transition:border-color .2s
        }
        .field input:focus{border-color:var(--primary)}
        .field input::placeholder{color:var(--text3)}

        /* ═══ Action button ═══ */
        .action-btn{
            display:flex;align-items:center;justify-content:center;gap:8px;
            width:100%;height:48px;border:none;border-radius:14px;
            background:linear-gradient(135deg,var(--primary),var(--primary-dark));
            color:#fff;font-family:inherit;font-size:.9rem;font-weight:700;
            cursor:pointer;transition:all .2s;
            box-shadow:0 8px 24px rgba(59,130,246,.2)
        }
        .dark-mode .action-btn{box-shadow:0 8px 24px rgba(129,140,248,.2)}
        .action-btn:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
        .action-btn:active:not(:disabled){transform:translateY(0) scale(.99)}
        .action-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
        .action-btn.success-btn{
            background:linear-gradient(135deg,var(--success),#059669);
            box-shadow:0 8px 24px rgba(16,185,129,.2)
        }
        .action-btn.ghost-btn{
            background:var(--card);color:var(--text2);border:1.5px solid var(--border);
            box-shadow:none
        }
        .action-btn.ghost-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}

        /* ═══ Result box ═══ */
        .result-box{margin-top:18px}
        .result-box:empty{display:none}
        .result-card-container{
            padding:18px;border-radius:16px;border:1px solid var(--border);
            background:rgba(59,130,246,.03);margin-bottom:12px
        }
        .dark-mode .result-card-container{background:rgba(129,140,248,.05)}
        .result-item{margin-bottom:12px}
        .result-label{
            display:flex;align-items:center;gap:6px;font-size:.74rem;font-weight:700;
            color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em
        }
        .result-value-row{
            display:flex;align-items:center;gap:8px;padding:10px 12px;
            border-radius:10px;border:1px solid var(--border);background:var(--card)
        }
        .result-value{
            flex:1;font-size:.84rem;font-weight:600;overflow:hidden;
            white-space:nowrap;text-overflow:ellipsis;min-width:0
        }
        .copy-btn{
            height:30px;padding:0 10px;border:1px solid var(--border);border-radius:8px;
            background:var(--card);color:var(--text2);font-family:inherit;
            font-size:.72rem;font-weight:700;cursor:pointer;
            display:inline-flex;align-items:center;gap:5px;transition:all .2s;flex-shrink:0
        }
        .copy-btn:hover{border-color:var(--primary);color:var(--primary)}
        .copy-btn.copied{background:var(--success);color:#fff;border-color:var(--success)}

        /* ═══ Download info ═══ */
        .download-info{
            margin-top:16px;padding:18px;border-radius:16px;
            border:1px solid var(--border);background:rgba(16,185,129,.04)
        }
        .dark-mode .download-info{background:rgba(16,185,129,.06)}
        .download-info h3{font-size:.9rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .dl-meta{display:grid;gap:8px;margin-bottom:16px}
        .dl-meta-row{
            display:flex;justify-content:space-between;align-items:center;
            padding:8px 12px;border-radius:10px;background:var(--card);
            border:1px solid var(--border);font-size:.82rem
        }
        .dl-meta-row strong{color:var(--text2);font-weight:600;font-size:.76rem}
        .dl-actions{display:flex;gap:8px;flex-wrap:wrap}

        /* ═══ Preview ═══ */
        #sharePreviewContainer{
            margin-top:14px;border-radius:14px;overflow:hidden;
            border:1px solid var(--border)
        }
        #sharePreviewIframe{width:100%;height:70vh;border:none}

        /* ═══ Toast ═══ */
        .toast-container{
            position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            z-index:999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none
        }
        .toast{
            background:var(--card);border:1px solid var(--border);color:var(--text);
            padding:10px 18px;border-radius:12px;font-size:.84rem;font-weight:500;
            box-shadow:var(--sh-m);transform:translateY(16px);opacity:0;
            transition:all .3s;pointer-events:auto;max-width:min(360px,90vw);text-align:center
        }
        .toast.show{transform:translateY(0);opacity:1}
        .toast.success{border-left:3px solid var(--success)}
        .toast.error{border-left:3px solid var(--danger)}
        .toast.warning{border-left:3px solid var(--warning)}
        .toast.info{border-left:3px solid var(--primary)}

        /* ═══ Spinner ═══ */
        .loading-spinner{
            width:17px;height:17px;border:2px solid rgba(255,255,255,.4);
            border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ═══ Utility ═══ */
        .hidden{display:none!important}
        @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

        /* ═══ Responsive ═══ */
        @media(max-width:540px){
            .shell{padding:8px 12px 24px}
            .card{padding:18px}
            .settings-row{grid-template-columns:1fr}
            .tab{padding:0 14px;font-size:.8rem}
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ═══ Topbar ═══ -->
<header class="topbar">
    <a class="brand" href="index.html">QuickShare</a>
    <nav class="topbar-right">
        <button class="t-btn" onclick="location.href='netdisk.html'" title="Cloud Storage">
            <i class="fa-solid fa-hard-drive"></i>
        </button>
        <button class="t-btn" id="darkModeToggle" onclick="toggleTheme()" title="Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button class="t-btn t-btn-label" id="langBtn" onclick="toggleLanguage()">EN</button>
        <span id="authButtons">
            <button class="t-btn t-btn-label" onclick="location.href='login.html'" data-i18n="loginBtn">Login</button>
        </span>
    </nav>
</header>

<!-- ═══ Main ═══ -->
<main class="shell">

    <!-- Tab toggle -->
    <div class="tab-bar">
        <button class="tab active" onclick="switchTab('upload')">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span data-i18n="uploadSectionTitle">Upload & Share</span>
        </button>
        <button class="tab" onclick="switchTab('download')">
            <i class="fa-solid fa-cloud-arrow-down"></i>
            <span data-i18n="downloadSectionTitle">Download</span>
        </button>
    </div>

    <!-- ═══ Upload tab ═══ -->
    <div id="upload-tab" class="tab-content active">
        <div class="card" id="mainCard">

            <!-- Drop zone -->
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                <p class="upload-title" data-i18n="uploadAreaTitle">Drop files here or click to browse</p>
                <p class="upload-hint" data-i18n="uploadAreaHint">Supports multiple files, up to 10 GB each</p>
                <input type="file" id="fileInput" style="display:none" multiple onchange="handleFileSelect(event)">
                <input type="file" id="folderInput" style="display:none" webkitdirectory directory multiple onchange="handleFileSelect(event)">
            </div>

            <!-- Pick buttons -->
            <div class="pick-row">
                <button class="pick-btn" type="button" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-paperclip"></i>
                    <span data-i18n="transferSelectFiles">Files</span>
                </button>
                <button class="pick-btn" type="button" onclick="openFolderPicker()">
                    <i class="fa-solid fa-folder-open"></i>
                    <span data-i18n="transferChooseFolder">Folder</span>
                </button>
            </div>

            <!-- Selected file list -->
            <div class="file-list" id="fileList" style="display:none">
                <h4 data-i18n="selectedFiles">Selected files:</h4>
                <div id="fileItems"></div>
            </div>

            <!-- Settings -->
            <div class="settings">
                <div class="field">
                    <label data-i18n="extractCodeLabel">Extract code (optional)</label>
                    <input type="text" id="extractCode" placeholder="4-6 characters" data-i18n-placeholder="extractCodePlaceholder" maxlength="6">
                </div>
                <div class="settings-row">
                    <div class="field">
                        <label data-i18n="expireHoursLabel">Expires in (hours)</label>
                        <input type="number" id="expireHours" placeholder="24" value="24" min="1">
                    </div>
                    <div class="field">
                        <label data-i18n="maxDownloadLabel">Max downloads</label>
                        <input type="number" id="maxDownload" placeholder="Unlimited" data-i18n-placeholder="maxDownloadPlaceholder" min="1">
                    </div>
                </div>
                <button class="action-btn" id="uploadBtn" onclick="uploadAndShare()" disabled>
                    <i class="fa-solid fa-share-nodes"></i>
                    <span data-i18n="uploadAndShareBtn">Upload & Get Link</span>
                </button>
            </div>

            <!-- Result -->
            <div class="result-box" id="resultBox"></div>
        </div>
    </div>

    <!-- ═══ Download tab ═══ -->
    <div id="download-tab" class="tab-content">
        <div class="card">

            <div class="field" style="margin-bottom:12px">
                <label data-i18n="shareCodeLabel">Share code</label>
                <input type="text" id="downloadShareCode" placeholder="8-character code" data-i18n-placeholder="downloadShareCodePlaceholder">
            </div>
            <div class="field" style="margin-bottom:14px">
                <label data-i18n="extractCodeLabel2">Extract code (if any)</label>
                <input type="text" id="downloadExtractCode" placeholder="Enter extract code" data-i18n-placeholder="downloadExtractCodePlaceholder">
            </div>
            <button class="action-btn" onclick="getShareInfo()">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span data-i18n="viewFileInfoBtn">Look up file</span>
            </button>

            <div class="download-info" id="downloadInfo" style="display:none">
                <h3>
                    <i class="fa-solid fa-file-circle-check" style="color:var(--success)"></i>
                    <span data-i18n="fileInfoTitle">File ready</span>
                </h3>
                <div class="dl-meta">
                    <div class="dl-meta-row">
                        <strong data-i18n="fileName">Name</strong>
                        <span id="downloadFileName"></span>
                    </div>
                    <div class="dl-meta-row">
                        <strong data-i18n="expireTime">Expires</strong>
                        <span id="downloadExpireTime"></span>
                    </div>
                    <div class="dl-meta-row">
                        <strong data-i18n="remainingDownloads">Remaining</strong>
                        <span id="downloadRemaining"></span>
                    </div>
                </div>
                <div class="dl-actions">
                    <button class="action-btn success-btn" onclick="downloadFile()" style="flex:1">
                        <i class="fa-solid fa-download"></i>
                        <span data-i18n="downloadBtn">Download</span>
                    </button>
                    <button class="action-btn ghost-btn" id="previewShareBtn" onclick="previewShareFile()" style="display:none;flex:1">
                        <i class="fa-solid fa-eye"></i>
                        <span data-i18n="previewBtn">Preview</span>
                    </button>
                </div>
                <div id="sharePreviewContainer" style="display:none">
                    <iframe id="sharePreviewIframe"></iframe>
                </div>
            </div>
        </div>
    </div>

</main>

<!-- ═══ Scripts ═══ -->
<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/theme.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/qrcode-handler.js"></script>
<script src="js/upload.js"></script>
<script src="js/download.js"></script>

<script>
    /* Compact auth override (same as homepage) */
    (function(){
        var _orig=window.renderLoggedInState;
        window.renderLoggedInState=function(user){
            var el=document.getElementById('authButtons');
            if(!el) return _orig?_orig(user):undefined;
            var name=user.nickname||user.username||'';
            var lang=typeof getCurrentLanguage==='function'?getCurrentLanguage():'zh';
            el.innerHTML=
                '<span style="font-size:.8rem;font-weight:600;padding:0 4px">'+name+'</span>'+
                '<button class="t-btn t-btn-label" onclick="handleLogout()" title="'+
                (lang==='zh'?'退出':'Logout')+'">'+
                '<i class="fa-solid fa-right-from-bracket"></i></button>';
        };
    })();

    /* Mouse light effect */
    document.addEventListener('mousemove',function(e){
        var card=document.getElementById('mainCard');
        if(!card) return;
        var r=card.getBoundingClientRect();
        card.style.setProperty('--mouse-x',((e.clientX-r.left)/r.width*100)+'%');
        card.style.setProperty('--mouse-y',((e.clientY-r.top)/r.height*100)+'%');
    });

    window.addEventListener('load',function(){
        Promise.resolve(checkLoginState());
        initUploadArea();

        var p=parseShareParams();
        if(p.shareCode){
            initGuestMode(p.shareCode,p.extractCode);
        }
    });
</script>
</body>
</html>
