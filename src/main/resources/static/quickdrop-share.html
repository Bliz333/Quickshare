<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="quickDropPublicPageTitle">QuickDrop Share - 公开分享</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <script>
        (function() {
            const saved = localStorage.getItem('quickshare-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0369a1;
            --primary-soft: rgba(14, 165, 233, 0.12);
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --bg-page: #f4fbff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --border-color: rgba(148, 163, 184, 0.24);
            --shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
            --radius: 28px;
        }

        .dark-mode {
            --primary: #818cf8;
            --primary-dark: #a5b4fc;
            --primary-soft: rgba(129, 140, 248, 0.18);
            --text-main: #e2e8f0;
            --text-sub: #94a3b8;
            --bg-page: #020617;
            --bg-card: rgba(15, 23, 42, 0.9);
            --border-color: rgba(148, 163, 184, 0.18);
            --shadow: 0 28px 80px rgba(2, 6, 23, 0.5);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.12), transparent 34%),
                radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.1), transparent 32%),
                var(--bg-page);
        }

        .top-buttons {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 20;
            display: flex;
            gap: 8px;
            padding: 8px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .dark-mode .top-buttons {
            background: rgba(15, 23, 42, 0.76);
        }

        .top-btn {
            min-width: 42px;
            height: 42px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-sub);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .top-btn:hover {
            color: white;
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .page {
            width: min(920px, calc(100vw - 28px));
            margin: 0 auto;
            padding: 96px 0 32px;
        }

        .hero,
        .card {
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .hero {
            border-radius: 32px;
            padding: 30px 32px;
            margin-bottom: 20px;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .hero p {
            margin: 0;
            color: var(--text-sub);
            line-height: 1.8;
        }

        .card {
            border-radius: var(--radius);
            padding: 22px;
        }

        .card.hidden {
            display: none !important;
        }

        .card h2 {
            margin: 0 0 8px;
            font-size: 1.2rem;
        }

        .section-note,
        .meta,
        .empty {
            margin: 0;
            color: var(--text-sub);
            line-height: 1.7;
        }

        .field {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .field label {
            font-size: 0.86rem;
            font-weight: 700;
            color: var(--text-sub);
        }

        .field input {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 13px 14px;
            background: rgba(255,255,255,0.72);
            color: var(--text-main);
            font: inherit;
        }

        .dark-mode .field input {
            background: rgba(15, 23, 42, 0.72);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .btn {
            min-height: 44px;
            border-radius: 16px;
            border: none;
            padding: 0 18px;
            font: inherit;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        .btn-secondary {
            color: var(--text-main);
            background: rgba(148, 163, 184, 0.14);
            border: 1px solid var(--border-color);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .selected-file,
        .pickup-meta {
            margin-top: 14px;
            padding: 16px;
            border-radius: 18px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid var(--border-color);
        }

        .selected-file {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .transfer-list {
            display: grid;
            gap: 12px;
            margin-top: 14px;
        }

        .transfer-card {
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.54);
            display: grid;
            gap: 10px;
        }

        .dark-mode .transfer-card {
            background: rgba(15, 23, 42, 0.54);
        }

        .transfer-card h3 {
            margin: 0 0 8px;
            font-size: 1rem;
        }

        .transfer-card-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: start;
        }

        .transfer-card-title {
            min-width: 0;
            flex: 1;
        }

        .transfer-card-title h3 {
            word-break: break-word;
        }

        .hidden {
            display: none !important;
        }

        .progress {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.18);
            overflow: hidden;
            margin-top: 14px;
        }

        .progress-bar {
            width: 0;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--primary), var(--success));
            transition: width 0.2s ease;
        }

        .result-link {
            display: block;
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.68);
            color: var(--text-main);
            text-decoration: none;
            word-break: break-all;
        }

        .dark-mode .result-link {
            background: rgba(15, 23, 42, 0.68);
        }

        .pickup-grid {
            display: grid;
            gap: 12px;
            margin-top: 14px;
        }

        .pickup-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            color: var(--text-main);
            font-weight: 600;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 700;
        }

        .toast-container {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--primary);
            color: var(--text-main);
            padding: 12px 18px;
            border-radius: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow);
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.25s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 640px) {
            .page {
                width: calc(100vw - 20px);
                padding-top: 90px;
            }

            .hero,
            .card {
                padding: 18px;
                border-radius: 22px;
            }

            .top-buttons {
                top: 12px;
                right: 12px;
                left: 12px;
                justify-content: flex-end;
            }

            .top-btn span {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="top-buttons">
    <button class="top-btn" type="button" onclick="location.href='index.html'">
        <i class="fa-solid fa-house"></i>
        <span data-i18n="quickDropBackHome">首页</span>
    </button>
    <button class="top-btn" type="button" onclick="location.href='quickdrop.html'">
        <i class="fa-solid fa-wifi"></i>
        <span data-i18n="quickDropToDeviceTransfer">设备互传</span>
    </button>
    <button class="top-btn" id="darkModeToggle" type="button" onclick="toggleTheme()">
        <i class="fa-solid fa-moon"></i>
    </button>
    <button class="top-btn" id="langBtn" type="button" onclick="toggleLanguage()">EN</button>
</div>

<main class="page">
    <section class="hero">
        <h1 data-i18n="quickDropPublicTitle">QuickDrop Share</h1>
        <p data-i18n="quickDropPublicSubtitle">不登录也可以上传文件并生成一个临时取件链接。打开链接的人可以直接下载；登录用户还可以把文件保存到自己的网盘。</p>
    </section>

    <section id="quickDropPublicCreateCard" class="card">
        <h2 data-i18n="quickDropPublicCreateTitle">创建公开分享</h2>
        <p class="section-note" data-i18n="quickDropPublicCreateHint">当前阶段同样采用服务器中转和 chunk 续传。上传中断后，重新选择同一个文件会继续缺失分片。</p>

        <div class="field">
            <label for="quickDropPublicSenderLabel" data-i18n="quickDropPublicSenderLabel">显示名称</label>
            <input id="quickDropPublicSenderLabel" type="text" data-i18n="quickDropPublicSenderPlaceholder" placeholder="例如：临时投递">
        </div>

        <div class="selected-file" id="quickDropPublicSelectedFile">
            <span data-i18n="quickDropNoFileSelected">尚未选择文件</span>
        </div>

        <input id="quickDropPublicFileInput" type="file" style="display:none;">

        <div class="actions">
            <button id="quickDropPublicChooseBtn" class="btn btn-secondary" type="button" onclick="openQuickDropPublicFilePicker()">
                <i class="fa-solid fa-paperclip"></i>
                <span data-i18n="quickDropSelectFile">选择文件</span>
            </button>
            <button id="quickDropPublicSendBtn" class="btn btn-primary" type="button" onclick="createQuickDropPublicShare()">
                <i class="fa-solid fa-share-nodes"></i>
                <span data-i18n="quickDropPublicCreateBtn">创建分享链接</span>
            </button>
        </div>

        <div class="progress">
            <div id="quickDropPublicProgressBar" class="progress-bar"></div>
        </div>
        <p id="quickDropPublicProgressMeta" class="meta">-</p>

        <a id="quickDropPublicResultLink" class="result-link" href="#" target="_blank" rel="noopener" style="display:none;"></a>
    </section>

    <section class="card" style="margin-top:20px;">
        <h2 data-i18n="quickDropToDeviceTransfer">设备互传</h2>
        <p class="section-note" data-i18n="quickShareToQuickDropHint">如果你要临时互传或自己的设备间传输，请直接进入 QuickDrop。</p>
        <div class="actions">
            <button class="btn btn-secondary" type="button" onclick="location.href='quickdrop.html'">
                <i class="fa-solid fa-wifi"></i>
                <span data-i18n="quickShareOpenQuickDrop">前往 QuickDrop</span>
            </button>
        </div>
    </section>

    <section id="quickDropPublicPickupCard" class="card hidden">
        <h2 data-i18n="quickDropPublicPickupTitle">取件页</h2>
        <p class="section-note" id="quickDropPublicPickupHint" data-i18n="quickDropPublicPickupHint">文件上传完成后可直接下载。若你已登录，也可以把它保存到自己的网盘。</p>

        <div class="actions" style="margin-top:0;">
            <span id="quickDropPublicStatus" class="status-pill">-</span>
        </div>

        <div class="pickup-meta">
            <div class="pickup-grid">
                <div class="pickup-row"><span data-i18n="quickDropPublicFileName">文件名</span><span id="quickDropPublicFileName">-</span></div>
                <div class="pickup-row"><span data-i18n="quickDropPublicSender">发送者</span><span id="quickDropPublicSender">-</span></div>
                <div class="pickup-row"><span data-i18n="quickDropPublicFileSize">大小</span><span id="quickDropPublicFileSize">-</span></div>
                <div class="pickup-row"><span data-i18n="quickDropPublicUpdatedAt">更新时间</span><span id="quickDropPublicUpdatedAt">-</span></div>
            </div>
        </div>

        <div class="field" id="quickDropPublicSaveFolderWrap" style="display:none;">
            <label for="quickDropPublicSaveFolderSelect" data-i18n="quickDropSaveFolderLabel">保存到文件夹</label>
            <select id="quickDropPublicSaveFolderSelect"></select>
        </div>

        <div class="actions">
            <button id="quickDropPublicDownloadBtn" class="btn btn-primary" type="button" onclick="downloadQuickDropPublicShare()">
                <i class="fa-solid fa-download"></i>
                <span data-i18n="quickDropDownload">下载</span>
            </button>
            <button id="quickDropPublicSaveBtn" class="btn btn-secondary" type="button" onclick="saveQuickDropPublicShareToNetdisk()">
                <i class="fa-solid fa-hard-drive"></i>
                <span data-i18n="quickDropSaveToNetdisk">保存到网盘</span>
            </button>
        </div>
    </section>
</main>

<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/theme.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/quickdrop-share.js"></script>
</body>
</html>
