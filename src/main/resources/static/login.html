<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="loginPageTitle">登录 - QuickShare</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 防止主题闪烁 -->
    <script>
        (function() {
            const saved = localStorage.getItem('quickshare-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>

    <style>
        /* ==================== 浅色主题（默认） ==================== */
        :root {
            --primary: #0ea5e9;
            --primary-light: #38bdf8;
            --primary-dark: #0284c7;
            --accent: #06b6d4;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --bg-light: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-strong: 0 20px 40px rgba(0, 0, 0, 0.1);
            --radius: 20px;
        }

        /* ==================== 暗黑主题 ==================== */
        .dark-mode {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #f87171;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --bg-light: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-strong: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 动态背景 */
        .bg-glow { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; opacity: 0.3; }
        .blob { position: absolute; filter: blur(100px); opacity: 0.6; border-radius: 50%; animation: float 20s infinite alternate; }
        .blob-1 { top: -15%; left: -10%; width: 45vw; height: 45vw; background: #93c5fd; }
        .blob-2 { bottom: -15%; right: -10%; width: 55vw; height: 55vw; background: #3b82f6; animation-delay: -5s; }
        .blob-3 { top: 50%; left: 50%; width: 30vw; height: 30vw; background: #7dd3fc; opacity: 0.3; animation-delay: -10s; }

        .dark-mode .blob-1 { background: #4f46e5; }
        .dark-mode .blob-2 { background: #6366f1; }
        .dark-mode .blob-3 { background: #818cf8; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(40px, 40px) rotate(15deg); }
        }

        /* ========== 顶部按钮组 ========== */
        .top-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .top-btn {
            background: var(--bg-card);
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: var(--shadow-subtle);
        }

        .top-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        #darkModeToggle { width: 40px; padding: 8px; }
        #darkModeToggle i { font-size: 1rem; transition: transform 0.3s; }
        #darkModeToggle:hover i { transform: rotate(20deg) scale(1.1); }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        /* Main Card */
        .login-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-strong);
            animation: slideUp 0.5s ease-out;
            transition: all 0.3s;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { text-align: center; margin-bottom: 35px; }
        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 8px;
            transition: color 0.3s;
        }
        .dark-mode .logo h1 { color: var(--primary-light); }
        .logo p { color: var(--text-sub); font-size: 0.95rem; }

        /* Forms */
        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 600;
            margin-left: 4px;
        }

        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            pointer-events: none;
            transition: 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
            background: var(--bg-card);
        }
        .dark-mode .form-group input:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .form-group input:focus + .input-icon { color: var(--primary); }
        .form-group input::placeholder { color: var(--text-sub); opacity: 0.7; }

        /* Button */
        .btn {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .dark-mode .btn {
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .dark-mode .btn:hover {
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        /* Links */
        .links {
            margin-top: 28px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-sub);
        }
        .links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
            transition: 0.2s;
        }
        .links a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        .dark-mode .links a:hover { color: var(--primary-light); }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-sub);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .divider span { padding: 0 15px; }

        /* Toast */
        .toast-container { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px 24px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-strong);
            transform: translateY(-30px);
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.success i { color: var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.error i { color: var(--danger); }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container { padding: 40px 25px; }
            .top-btn span { display: none; }
            .back-btn { padding: 10px 14px; }
        }
    </style>
</head>
<body>

<div class="bg-glow">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- 返回按钮 -->
<a href="index.html" class="top-btn back-btn">
    <i class="fa-solid fa-arrow-left"></i>
    <span style="margin-left: 6px;" data-i18n="backHome">返回首页</span>
</a>

<!-- 顶部按钮组 -->
<div class="top-buttons">
    <button class="top-btn" id="darkModeToggle" onclick="toggleTheme()" title="切换主题">
        <i class="fa-solid fa-moon"></i>
    </button>
    <button class="top-btn" id="langBtn" onclick="toggleLanguage()">EN</button>
</div>

<div class="login-container">
    <div class="logo">
        <h1>QuickShare</h1>
        <p data-i18n="loginSubtitle">欢迎回来，请登录您的账号</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label data-i18n="usernameLabel"><i class="fa-regular fa-user" style="margin-right: 6px;"></i>用户名</label>
            <div class="input-wrapper">
                <input type="text" id="username" data-i18n="usernamePlaceholder" placeholder="请输入用户名" required autocomplete="username">
                <i class="fa-regular fa-user input-icon"></i>
            </div>
        </div>

        <div class="form-group">
            <label data-i18n="passwordLabel"><i class="fa-solid fa-lock" style="margin-right: 6px;"></i>密码</label>
            <div class="input-wrapper">
                <input type="password" id="password" data-i18n="passwordPlaceholder" placeholder="请输入密码" required autocomplete="current-password">
                <i class="fa-solid fa-lock input-icon"></i>
            </div>
        </div>

        <button type="submit" class="btn" id="loginBtn">
            <span data-i18n="loginSubmit">登录</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>

    <div class="divider"><span data-i18n="or">或</span></div>

    <div class="links">
        <span data-i18n="noAccount">还没有账号？</span>
        <a href="register.html" data-i18n="registerNow">立即注册</a>
    </div>
</div>

<!-- JS 文件 -->
<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/ui.js"></script>
<script src="js/login.js"></script>
</body>
</html>
