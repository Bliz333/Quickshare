<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="transferPublicPageTitle">QuickShare - Share</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        (() => {
            var s=localStorage.getItem('quickshare-theme');
            if(s==='dark'||(!s&&window.matchMedia('(prefers-color-scheme:dark)').matches))
                document.documentElement.classList.add('dark-mode');
        })();
    </script>
    <script>
        (() => {
            document.documentElement.classList.add('lang-pending');
            var l=localStorage.getItem('quickshare-lang');
            if(l==='en'||l==='zh') document.documentElement.lang=l==='en'?'en':'zh-CN';
        })();
    </script>

    <!-- Design-system CSS layer: tokens → base → components -->
    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        /* Page-specific: FOUC prevention (must stay inline, runs before body render) */
        html.lang-pending body{opacity:0}
        html.lang-ready body{opacity:1;transition:opacity .15s ease}
    </style>
</head>
<body data-mascot-scene="share">

<div class="toast-container" id="toastContainer"></div>

<!-- ═══ Topbar ═══ -->
<header class="topbar">
    <a class="brand" href="index.html">QuickShare</a>
    <nav class="topbar-right">
        <button class="t-btn" type="button" onclick="location.href='netdisk.html'" title="Cloud Storage">
            <i class="fa-solid fa-hard-drive"></i>
        </button>
        <button class="t-btn" type="button" id="darkModeToggle" onclick="toggleTheme()" title="Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button class="t-btn t-btn-text" type="button" id="langBtn" onclick="toggleLanguage()">EN</button>
        <span id="authButtons">
            <a href="login.html" class="t-btn" style="text-decoration:none" title="Login" aria-label="Login" data-i18n-aria-label="loginBtn">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span class="sr-only" data-i18n="loginBtn">Login</span>
            </a>
        </span>
    </nav>
</header>

<!-- ═══ Main ═══ -->
<main class="shell" data-mascot-stage="share-shell">

    <!-- Tab toggle -->
    <div class="tab-bar">
        <button class="tab active" type="button" onclick="switchTab('upload')">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span data-i18n="uploadSectionTitle">Upload & Share</span>
        </button>
        <button class="tab" type="button" onclick="switchTab('download')">
            <i class="fa-solid fa-cloud-arrow-down"></i>
            <span data-i18n="downloadSectionTitle">Download</span>
        </button>
    </div>

    <!-- ═══ Upload tab ═══ -->
    <div id="upload-tab" class="tab-content active">
        <div class="card" id="mainCard">

            <!-- Drop zone -->
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                <p class="upload-title" data-i18n="uploadAreaTitle">Drop files here or click to browse</p>
                <p class="upload-hint" data-i18n="uploadAreaHint">Supports multiple files, up to 10 GB each</p>
                <input type="file" id="fileInput" style="display:none" multiple onchange="handleFileSelect(event)">
                <input type="file" id="folderInput" style="display:none" webkitdirectory directory multiple onchange="handleFileSelect(event)">
            </div>

            <!-- Pick buttons -->
            <div class="pick-row">
                <button class="pick-btn" type="button" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-paperclip"></i>
                    <span data-i18n="transferSelectFiles">Files</span>
                </button>
                <button class="pick-btn" type="button" onclick="openFolderPicker()">
                    <i class="fa-solid fa-folder-open"></i>
                    <span data-i18n="transferChooseFolder">Folder</span>
                </button>
            </div>

            <!-- Selected file list -->
            <div class="file-list" id="fileList" style="display:none">
                <h4 data-i18n="selectedFiles">Selected files:</h4>
                <div id="fileItems"></div>
            </div>

            <!-- Settings -->
            <div class="settings">
                <div class="field">
                    <label data-i18n="extractCodeLabel">Extract code (optional)</label>
                    <input type="text" id="extractCode" placeholder="4-6 characters" data-i18n-placeholder="extractCodePlaceholder" maxlength="6">
                </div>
                <div class="settings-row">
                    <div class="field">
                        <label data-i18n="expireHoursLabel">Expires in (hours)</label>
                        <input type="number" id="expireHours" placeholder="24" value="24" min="1">
                    </div>
                    <div class="field">
                        <label data-i18n="maxDownloadLabel">Max downloads</label>
                        <input type="number" id="maxDownload" placeholder="Unlimited" data-i18n-placeholder="maxDownloadPlaceholder" min="1">
                    </div>
                </div>
                <button class="action-btn" type="button" id="uploadBtn" onclick="uploadAndShare()" disabled>
                    <i class="fa-solid fa-share-nodes"></i>
                    <span data-i18n="uploadAndShareBtn">Upload & Get Link</span>
                </button>
            </div>

            <!-- Result -->
            <div class="result-box" id="resultBox"></div>
        </div>
    </div>

    <!-- ═══ Download tab ═══ -->
    <div id="download-tab" class="tab-content">
        <div class="card">

            <div class="field" id="downloadShareCodeField" style="margin-bottom:12px">
                <label data-i18n="shareCodeLabel">Share code</label>
                <input type="text" id="downloadShareCode" placeholder="8-character code" data-i18n-placeholder="downloadShareCodePlaceholder">
            </div>
            <div class="field" id="downloadExtractCodeField" style="margin-bottom:14px">
                <label data-i18n="extractCodeLabel2">Extract code (if any)</label>
                <input type="text" id="downloadExtractCode" placeholder="Enter extract code" data-i18n-placeholder="downloadExtractCodePlaceholder">
            </div>
            <button class="action-btn" type="button" id="downloadLookupBtn" onclick="getShareInfo()">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span data-i18n="viewFileInfoBtn">Look up file</span>
            </button>

            <div class="download-info" id="pickupInfo" style="display:none">
                <h3>
                    <i class="fa-solid fa-bolt" style="color:var(--primary)"></i>
                    <span data-i18n="transferPublicPickupTitle">Pickup View</span>
                </h3>
                <div class="dl-meta">
                    <div class="dl-meta-row">
                        <strong data-i18n="transferPublicFileName">File Name</strong>
                        <span id="pickupFileName"></span>
                    </div>
                    <div class="dl-meta-row">
                        <strong data-i18n="transferPublicSender">Sender</strong>
                        <span id="pickupSender"></span>
                    </div>
                    <div class="dl-meta-row">
                        <strong data-i18n="transferPublicFileSize">Size</strong>
                        <span id="pickupFileSize"></span>
                    </div>
                    <div class="dl-meta-row">
                        <strong data-i18n="transferPublicUpdatedAt">Updated</strong>
                        <span id="pickupUpdatedAt"></span>
                    </div>
                </div>
                <div class="dl-actions">
                    <button class="action-btn success-btn" type="button" id="pickupDownloadBtn" onclick="downloadPickupFile()">
                        <i class="fa-solid fa-download"></i>
                        <span data-i18n="downloadBtn">Download</span>
                    </button>
                    <button class="action-btn ghost-btn" type="button" id="pickupSaveBtn" onclick="savePickupToNetdisk()" style="display:none">
                        <i class="fa-solid fa-hard-drive"></i>
                        <span data-i18n="transferSaveToNetdisk">Save to Netdisk</span>
                    </button>
                </div>
            </div>

            <div class="download-info" id="downloadInfo" style="display:none">
                <h3>
                    <i class="fa-solid fa-file-circle-check" style="color:var(--success)"></i>
                    <span data-i18n="fileInfoTitle">File ready</span>
                </h3>
                <div class="dl-meta">
                    <div class="dl-meta-row">
                        <strong data-i18n="fileName">Name</strong>
                        <span id="downloadFileName"></span>
                    </div>
                    <div class="dl-meta-row">
                        <strong data-i18n="expireTime">Expires</strong>
                        <span id="downloadExpireTime"></span>
                    </div>
                    <div class="dl-meta-row">
                        <strong data-i18n="remainingDownloads">Remaining</strong>
                        <span id="downloadRemaining"></span>
                    </div>
                </div>
                <div class="dl-actions">
                    <button class="action-btn success-btn" type="button" onclick="downloadFile()" style="flex:1">
                        <i class="fa-solid fa-download"></i>
                        <span data-i18n="downloadBtn">Download</span>
                    </button>
                    <button class="action-btn ghost-btn" type="button" id="previewShareBtn" onclick="previewShareFile()" style="display:none;flex:1">
                        <i class="fa-solid fa-eye"></i>
                        <span data-i18n="previewBtn">Preview</span>
                    </button>
                </div>
                <div id="sharePreviewContainer" style="display:none">
                    <iframe id="sharePreviewIframe" title="Shared file preview"></iframe>
                </div>
            </div>
        </div>
    </div>

</main>

<!-- ═══ Scripts ═══ -->
<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/theme.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/qrcode-handler.js"></script>
<script src="js/upload.js"></script>
<script src="js/download.js"></script>
<script src="js/mascots.js"></script>
<script src="js/spa-router.js"></script>

<script>
    /* Compact auth override (same as homepage) */
    (() => {
        var _orig=window.renderLoggedInState;
        window.renderLoggedInState=(user) => {
            var el=document.getElementById('authButtons');
            if(!el) return _orig?_orig(user):undefined;
            var name=user.nickname||user.username||'';
            var lang=typeof getCurrentLanguage==='function'?getCurrentLanguage():'zh';
        el.innerHTML=`<span style="font-size:.8rem;font-weight:600;padding:0 4px">${name}</span><button class="t-btn" type="button" onclick="handleLogout()" title="${lang==='zh'?'退出':'Logout'}" aria-label="${lang==='zh'?'退出':'Logout'}"><i class="fa-solid fa-right-from-bracket"></i></button>`;
        };
    })();

    /* Mouse light effect */
    document.addEventListener('mousemove',(e) => {
        var card=document.getElementById('mainCard');
        if(!card) return;
        var r=card.getBoundingClientRect();
        card.style.setProperty('--mouse-x',`${(e.clientX-r.left)/r.width*100}%`);
        card.style.setProperty('--mouse-y',`${(e.clientY-r.top)/r.height*100}%`);
    });

    /* SPA-aware init: run immediately if document already loaded, otherwise wait for load */
    (() => {
        const init = () => {
            Promise.resolve(checkLoginState());
            initUploadArea();
            initMascots();
            var p=parseShareParams();
            if(p.pickupToken){
                _pickupShareToken=p.pickupToken;
                switchTab('download');
                getPickupInfo();
            }else if(p.shareCode){
                initGuestMode(p.shareCode,p.extractCode);
            }
        };
        if(document.readyState==='complete'){init();}
        else{window.addEventListener('load',init);}
    })();
</script>
</body>
</html>
