<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="registerPageTitle">Register - QuickShare</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        (function() {
            const saved = localStorage.getItem('quickshare-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>

    <!-- Design-system CSS layer: tokens → base → components -->
    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        .bg-glow { z-index: -1; opacity: 0.3; }
        .blob-1 { top: -15%; left: -10%; width: 45vw; height: 45vw; background: #93c5fd; }
        .blob-2 { bottom: -15%; right: -10%; width: 55vw; height: 55vw; background: #f472b6; animation-delay: -7s; }
        .blob-3 { top: 40%; right: 20%; width: 25vw; height: 25vw; background: #7dd3fc; opacity: 0.4; animation-delay: -12s; }
        .dark-mode .blob-1 { background: #4f46e5; }
        .dark-mode .blob-2 { background: #be185d; }
        .dark-mode .blob-3 { background: #818cf8; }
        #darkModeToggle { width: 40px; padding: 8px; }
        #darkModeToggle i { font-size: 1rem; transition: transform .3s; }
        #darkModeToggle:hover i { transform: rotate(20deg) scale(1.1); }
    </style>
</head>
<body data-mascot-scene="register">

<div class="bg-glow">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<a href="index.html" class="top-btn back-btn">
    <i class="fa-solid fa-arrow-left"></i>
    <span style="margin-left: 6px;" data-i18n="backHome">Back to Home</span>
</a>

<div class="top-buttons">
    <button class="top-btn" id="darkModeToggle" onclick="toggleTheme()" title="Toggle theme">
        <i class="fa-solid fa-moon"></i>
    </button>
    <button class="top-btn" id="langBtn" onclick="toggleLanguage()">EN</button>
</div>

<div class="register-container" data-mascot-stage="auth-register">
    <div class="logo">
        <div class="logo-icon"><i class="fa-solid fa-user-plus"></i></div>
        <h1 data-i18n="registerTitle">Create Account</h1>
        <p data-i18n="registerSubtitle">Join QuickShare and start sharing</p>
    </div>

    <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
            <label data-i18n="usernameLabel"><i class="fa-regular fa-user"></i>Username *</label>
            <div class="input-wrapper">
                <input type="text" id="username" class="form-control" data-i18n="regUsernamePlaceholder" placeholder="Enter username" required minlength="3">
                <i class="fa-regular fa-user input-icon"></i>
            </div>
            <small data-i18n="usernameHint">At least 3 characters</small>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label data-i18n="passwordLabel"><i class="fa-solid fa-lock"></i>Password *</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" data-i18n="regPasswordPlaceholder" placeholder="At least 6 characters" required minlength="6">
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label data-i18n="confirmPasswordLabel"><i class="fa-solid fa-check-double"></i>Confirm Password *</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" class="form-control" data-i18n="confirmPasswordPlaceholder" placeholder="Re-enter password" required>
                    <i class="fa-solid fa-check-double input-icon"></i>
                </div>
            </div>
        </div>

        <div class="form-group" id="emailGroup">
            <label data-i18n="emailLabel"><i class="fa-regular fa-envelope"></i>Email *</label>
            <div class="email-row">
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-control" data-i18n="emailPlaceholder" placeholder="your@email.com" required>
                    <i class="fa-regular fa-envelope input-icon"></i>
                </div>
                <button type="button" class="btn-code" id="sendCodeBtn" onclick="sendVerificationCode()" data-i18n="sendCodeBtn">
                    Send Code
                </button>
            </div>
        </div>

        <div class="form-group" id="verificationCodeGroup">
            <label data-i18n="verificationCodeLabel"><i class="fa-solid fa-shield-halved"></i>Verification Code *</label>
            <div class="input-wrapper">
                <input type="text" id="verificationCode" class="form-control" data-i18n="verificationCodePlaceholder" placeholder="6-digit code" required maxlength="6">
                <i class="fa-solid fa-shield-halved input-icon"></i>
            </div>
        </div>

        <div class="form-group">
            <label data-i18n="nicknameLabel"><i class="fa-regular fa-face-smile"></i>Nickname (optional)</label>
            <div class="input-wrapper">
                <input type="text" id="nickname" class="form-control" data-i18n="nicknamePlaceholder" placeholder="Display name">
                <i class="fa-regular fa-face-smile input-icon"></i>
            </div>
        </div>

        <div class="captcha-container hidden" id="captchaContainer">
        </div>

        <button type="submit" class="btn-submit" id="registerBtn">
            <span data-i18n="registerSubmit">Register</span>
            <i class="fa-solid fa-user-plus"></i>
        </button>
    </form>

    <div class="divider" id="socialDivider" style="display:none"><span data-i18n="or">or</span></div>

    <div class="social-buttons" id="socialButtons"></div>

    <div class="card-footer">
        <span data-i18n="hasAccount">Already have an account?</span>
        <a href="login.html" data-i18n="loginNow">Sign in</a>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>
<script src="js/register.js"></script>
<script src="js/social-login.js"></script>
<script src="js/mascots.js"></script>
<script src="js/spa-router.js"></script>
<script>initMascots();</script>
</body>
</html>
