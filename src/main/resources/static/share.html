<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="transferPublicPageTitle">QuickShare - 分享与取件</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        (function() {
            const saved = localStorage.getItem('quickshare-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <script>
        (function() {
            const savedLang = localStorage.getItem('quickshare-lang');
            document.documentElement.classList.add('lang-pending');
            if (savedLang === 'en' || savedLang === 'zh') {
                document.documentElement.lang = savedLang === 'en' ? 'en' : 'zh-CN';
            }
        })();
    </script>
    <style>
        html.lang-pending body { opacity: 0; }
        html.lang-ready body { opacity: 1; transition: opacity 0.16s ease; }
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --success: #10b981;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --bg-page: #eff6ff;
            --bg-card: rgba(255,255,255,0.9);
            --border-color: rgba(148,163,184,0.25);
            --shadow-s: 0 6px 18px rgba(15,23,42,0.08);
            --shadow-m: 0 20px 50px rgba(15,23,42,0.12);
            --radius: 22px;
            --mouse-x: 50%;
            --mouse-y: 50%;
        }
        .dark-mode {
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --text-main: #e2e8f0;
            --text-sub: #94a3b8;
            --bg-page: #020617;
            --bg-card: rgba(15,23,42,0.88);
            --border-color: rgba(148,163,184,0.18);
            --shadow-s: 0 6px 18px rgba(2,6,23,0.25);
            --shadow-m: 0 20px 50px rgba(2,6,23,0.45);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(14,165,233,0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(16,185,129,0.14), transparent 26%),
                var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
        }
        .top-buttons {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 40;
            display: flex;
            gap: 6px;
            padding: 6px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow-s);
        }
        .dark-mode .top-buttons {
            background: rgba(15,23,42,0.78);
        }
        .top-btn {
            min-width: 40px;
            height: 40px;
            padding: 0 12px;
            border: 1px solid transparent;
            border-radius: 999px;
            background: transparent;
            color: var(--text-sub);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .top-btn:hover {
            background: var(--primary);
            color: white;
        }
        .page {
            width: min(1120px, calc(100vw - 40px));
            margin: 0 auto;
            padding: 108px 0 56px;
        }
        .hero {
            display: grid;
            gap: 16px;
            margin-bottom: 24px;
            padding: 28px 30px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background:
                radial-gradient(circle at top right, rgba(14,165,233,0.12), transparent 30%),
                var(--bg-card);
            box-shadow: var(--shadow-m);
        }
        .hero-kicker {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            width: fit-content;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(148,163,184,0.14);
            color: var(--text-sub);
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .hero h1 {
            margin: 0;
            font-size: clamp(2.2rem, 5vw, 4rem);
            line-height: 0.96;
        }
        .hero p {
            margin: 0;
            color: var(--text-sub);
            max-width: 720px;
            line-height: 1.7;
            font-size: 1rem;
        }
        .auth-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-auth {
            padding: 10px 22px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-register {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }
        .quick-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-sub);
            text-decoration: none;
            font: inherit;
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-s);
        }
        .quick-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
            gap: 20px;
            align-items: start;
        }
        .card {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            box-shadow: var(--shadow-m);
            padding: 24px;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(14,165,233,0.08), transparent 58%);
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }
        .card:hover::before {
            opacity: 1;
        }
        .card-section-title {
            margin: 0 0 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 18px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(148,163,184,0.08);
        }
        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(14,165,233,0.08);
        }
        .upload-icon {
            font-size: 2.6rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .upload-text {
            color: var(--text-sub);
            line-height: 1.7;
        }
        .upload-text small {
            display: block;
            margin-top: 6px;
        }
        .file-list { margin-top: 16px; }
        .file-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
        }
        .file-item-info {
            display: grid;
            gap: 4px;
            min-width: 0;
        }
        .file-item-info strong,
        .file-item-info small {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .remove-file-btn {
            border: none;
            background: transparent;
            color: var(--text-sub);
            cursor: pointer;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.84rem;
            color: var(--text-sub);
            font-weight: 700;
        }
        .input-group input {
            width: 100%;
            min-height: 46px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            font: inherit;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            min-height: 48px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(14,165,233,0.22);
        }
        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }
        .result-box,
        .download-info {
            margin-top: 18px;
        }
        .download-info {
            padding: 16px;
            border-radius: 16px;
            background: rgba(148,163,184,0.08);
            border: 1px solid var(--border-color);
        }
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 18px;
            border-radius: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-m);
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.25s ease;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .loading-spinner {
            width: 17px;
            height: 17px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 640px) {
            .page {
                width: calc(100vw - 24px);
                padding-top: 92px;
            }
            .hero,
            .card {
                padding: 20px;
            }
            .top-buttons {
                top: 12px;
                right: 12px;
                left: 12px;
                justify-content: flex-end;
            }
            .top-btn span {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="top-buttons">
    <button class="top-btn" type="button" onclick="location.href='index.html'">
        <i class="fa-solid fa-bolt"></i>
        <span data-i18n="transferBackHome">首页</span>
    </button>
    <button class="top-btn" type="button" onclick="location.href='transfer.html'">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span data-i18n="transferToDeviceTransfer">设备互传</span>
    </button>
    <button class="top-btn" type="button" onclick="location.href='netdisk.html'">
        <i class="fa-solid fa-hard-drive"></i>
        <span data-i18n="transferToNetdisk">网盘</span>
    </button>
    <button class="top-btn top-btn-icon" onclick="location.href='pricing.html'">
        <i class="fa-solid fa-tags"></i>
    </button>
    <button class="top-btn top-btn-icon" id="darkModeToggle" onclick="toggleTheme()">
        <i class="fa-solid fa-moon"></i>
    </button>
    <button class="top-btn" id="langBtn" onclick="toggleLanguage()">EN</button>
</div>

<main class="page">
    <section class="hero">
        <span class="hero-kicker">Share Tools</span>
        <h1 data-i18n="transferPublicTitle">QuickShare</h1>
        <p data-i18n="transferPublicSubtitle">上传文件生成分享码，或者输入分享码直接取件。首页现在只保留 Wi‑Fi / 配对码快传。</p>
        <div id="authButtons" class="auth-group">
            <button onclick="location.href='login.html'" class="btn-auth" data-i18n="loginBtn">登录</button>
            <button onclick="location.href='register.html'" class="btn-auth btn-register" data-i18n="registerBtn">注册账号</button>
        </div>
    </section>

    <div class="quick-actions">
        <a class="quick-btn" href="#shareCodeSection">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span data-i18n="homeShareCodeBtn">生成分享码</span>
        </a>
        <a class="quick-btn" href="#downloadSection">
            <i class="fa-solid fa-cloud-arrow-down"></i>
            <span data-i18n="homeDownloadCodeBtn">输入分享码下载</span>
        </a>
        <a class="quick-btn" href="transfer-share.html">
            <i class="fa-solid fa-globe"></i>
            <span data-i18n="homePublicDropBtn">公开投递</span>
        </a>
    </div>

    <section class="layout">
        <div class="card" id="mainCard">
            <h3 class="card-section-title">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span data-i18n="uploadSectionTitle">上传并生成分享码</span>
            </h3>

            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><i class="fa-solid fa-box-archive"></i></div>
                <div class="upload-text" data-i18n="uploadAreaText">
                    点击或拖拽文件至此
                    <small>(支持多文件批量上传，最大 10GB)</small>
                </div>
                <input type="file" id="fileInput" style="display: none;" multiple onchange="handleFileSelect(event)">
                <input type="file" id="folderInput" style="display: none;" webkitdirectory directory multiple onchange="handleFileSelect(event)">
            </div>

            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
                <button class="btn" type="button" onclick="document.getElementById('fileInput').click()"
                        style="width:auto; padding: 0 18px;" data-i18n="transferSelectFiles">
                    <span>选择文件</span> <i class="fa-solid fa-paperclip"></i>
                </button>
                <button class="btn" type="button" onclick="openFolderPicker()"
                        style="width:auto; padding: 0 18px; background: rgba(148,163,184,0.16); color: var(--text-main); box-shadow:none; border:1px solid var(--border-color);" data-i18n="transferChooseFolder">
                    <span>选择文件夹</span> <i class="fa-solid fa-folder-tree"></i>
                </button>
            </div>

            <div class="file-list" id="fileList" style="display: none;">
                <h4 data-i18n="selectedFiles">待上传列表:</h4>
                <div id="fileItems"></div>
            </div>

            <div style="margin-top: 22px;">
                <div class="input-group">
                    <label data-i18n="extractCodeLabel">提取码 (可选)</label>
                    <input type="text" id="extractCode" data-i18n="extractCodePlaceholder" placeholder="4-6位数字或字母" maxlength="6">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="input-group">
                        <label data-i18n="expireHoursLabel">有效期 (小时)</label>
                        <input type="number" id="expireHours" placeholder="24" value="24" min="1">
                    </div>
                    <div class="input-group">
                        <label data-i18n="maxDownloadLabel">最大次数</label>
                        <input type="number" id="maxDownload" data-i18n="maxDownloadPlaceholder" placeholder="无限制" min="1">
                    </div>
                </div>
                <button class="btn" id="uploadBtn" onclick="uploadAndShare()" disabled data-i18n="uploadAndShareBtn">
                    <span>开始上传并分享</span> <i class="fa-solid fa-share-nodes"></i>
                </button>
            </div>

            <div class="result-box" id="resultBox"></div>
        </div>

        <div class="card" id="downloadSection">
            <h3 class="card-section-title">
                <i class="fa-solid fa-cloud-arrow-down"></i>
                <span data-i18n="downloadSectionTitle">输入分享码下载</span>
            </h3>

            <div class="input-group">
                <label data-i18n="shareCodeLabel">分享码</label>
                <input type="text" id="downloadShareCode" data-i18n="downloadShareCodePlaceholder" placeholder="请输入8位分享码">
            </div>
            <div class="input-group">
                <label data-i18n="extractCodeLabel2">提取码 (如有)</label>
                <input type="text" id="downloadExtractCode" data-i18n="downloadExtractCodePlaceholder" placeholder="请输入提取码">
            </div>
            <button class="btn" onclick="getShareInfo()" data-i18n="viewFileInfoBtn">
                <span>查看文件信息</span> <i class="fa-solid fa-magnifying-glass"></i>
            </button>

            <div class="download-info" id="downloadInfo" style="display: none;">
                <h3 data-i18n="fileInfoTitle">文件详情</h3>
                <p><strong data-i18n="fileName">文件名</strong> <span id="downloadFileName"></span></p>
                <p><strong data-i18n="expireTime">过期时间</strong> <span id="downloadExpireTime"></span></p>
                <p><strong data-i18n="remainingDownloads">剩余次数</strong> <span id="downloadRemaining"></span></p>
                <div style="margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn" onclick="downloadFile()"
                            style="width:auto; padding:0 20px; background: var(--success); box-shadow: 0 12px 24px rgba(16,185,129,0.24);"
                            data-i18n="downloadBtn">
                        <span>立即下载</span> <i class="fa-solid fa-download"></i>
                    </button>
                    <button class="btn" id="previewShareBtn" onclick="previewShareFile()"
                            style="display:none; width:auto; padding:0 20px;"
                            data-i18n="previewBtn">
                        <span>在线预览</span> <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <div id="sharePreviewContainer" style="display:none; margin-top: 14px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color);">
                    <iframe id="sharePreviewIframe" style="width:100%; height: 70vh; border: none;"></iframe>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/theme.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/qrcode-handler.js"></script>
<script src="js/upload.js"></script>
<script src="js/download.js"></script>
<script>
    document.addEventListener('mousemove', (e) => {
        const card = document.getElementById('mainCard');
        if (!card) return;
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--mouse-x', `${x}%`);
        card.style.setProperty('--mouse-y', `${y}%`);
    });

    window.addEventListener('load', () => {
        Promise.resolve(checkLoginState());
        initUploadArea();

        const { shareCode, extractCode } = parseShareParams();
        if (shareCode) {
            initGuestMode(shareCode, extractCode);
        }
    });
</script>
</body>
</html>
