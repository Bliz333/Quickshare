services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: quickshare:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/quickshare?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 0
      FILE_UPLOAD_DIR: /opt/quickshare/uploads
      OFFICE_PREVIEW_COMMAND: ${OFFICE_PREVIEW_COMMAND:-soffice}
      OFFICE_PREVIEW_CACHE_DIR: ${OFFICE_PREVIEW_CACHE_DIR:-/opt/quickshare/uploads/.preview-cache}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_NICKNAME: ${BOOTSTRAP_ADMIN_NICKNAME:-}
      BOOTSTRAP_ADMIN_RESET_PASSWORD_ON_STARTUP: ${BOOTSTRAP_ADMIN_RESET_PASSWORD_ON_STARTUP:-false}
      ADMIN_CONSOLE_SLUG: ${ADMIN_CONSOLE_SLUG:-quickshare-admin}
      REGISTRATION_EMAIL_VERIFICATION_ENABLED: ${REGISTRATION_EMAIL_VERIFICATION_ENABLED:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      QUICKDROP_STUN_URLS: ${QUICKDROP_STUN_URLS:-stun:stun.l.google.com:19302}
      QUICKDROP_TURN_URLS: ${QUICKDROP_TURN_URLS:-}
      QUICKDROP_TURN_USERNAME: ${QUICKDROP_TURN_USERNAME:-}
      QUICKDROP_TURN_PASSWORD: ${QUICKDROP_TURN_PASSWORD:-}
      SETTING_ENCRYPT_KEY: ${SETTING_ENCRYPT_KEY:-}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
    ports:
      - "${APP_BIND_HOST:-0.0.0.0}:${APP_PORT:-8080}:8080"
    volumes:
      - quickshare-uploads:/opt/quickshare/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: quickshare
      MYSQL_USER: ${DB_USERNAME:-quickshare}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_BIND_HOST:-127.0.0.1}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_PORT_PUBLIC:-6379}:6379"
    volumes:
      - redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    profiles: ["s3"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    profiles: ["s3"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/${MINIO_BUCKET:-quickshare} &&
        mc anonymous set none local/${MINIO_BUCKET:-quickshare}

volumes:
  mysql-data:
  redis-data:
  quickshare-uploads:
  minio-data:
