# Local profile example; copy to application-local.yml and adjust values, or override via environment variables.
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/quickshare?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: quickshare
    password: change_me
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080

file:
  upload-dir: /tmp/quickshare/uploads
  allowed-types:
  max-size: -1

jwt:
  secret: change-this-secret-at-least-256-bits
  expiration: 86400000

recaptcha:
  enabled: true
  site-key:
  secret-key:
  verify-url: https://www.google.com/recaptcha/api/siteverify

app:
  admin-console:
    slug: quickshare-admin
  registration:
    email-verification-enabled: false
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
    allow-credentials: false
    max-age-seconds: 3600
  file-preview:
    enabled: true
    image-enabled: true
    video-enabled: true
    audio-enabled: true
    pdf-enabled: true
    text-enabled: true
    office-enabled: true
    allowed-extensions:
  office-preview:
    enabled: true
    command: soffice
    timeout-seconds: 120
    cache-dir:
  bootstrap-admin:
    enabled: false
    username:
    password:
    email:
    nickname:
    reset-password-on-startup: false
  rate-limit:
    guest-upload:
      enabled: true
      max-requests: 10
      window-seconds: 600
    public-download:
      enabled: true
      max-requests: 30
      window-seconds: 600
    public-share-info:
      enabled: true
      max-requests: 60
      window-seconds: 600
    public-share-extract-code-error:
      enabled: true
      max-requests: 5
      window-seconds: 600
