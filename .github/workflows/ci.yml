name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test
        run: ./mvnw -B -q test -Dspring.flyway.enabled=false
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Verify JS syntax baseline
        run: ./scripts/check-js.sh

      - name: Package (skip tests)
        run: ./mvnw -B -q package -DskipTests

  playwright-mock:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mock-only Playwright tests
        run: |
          npx playwright test \
            tests/e2e/home-notifications.spec.js \
            tests/e2e/netdisk-quota.spec.js \
            tests/e2e/pricing-payment.spec.js \
            tests/e2e/quickdrop.spec.js \
            tests/e2e/register-captcha.spec.js
